<style>

*{box-sizing:border-box;margin:0;padding:0}body{font-family:Jost,Arial,sans-serif;background:var(--screen);color:#fff;line-height:1.55}.top{position:sticky;top:0;z-index:20;background:rgba(7,23,47,.96);border-bottom:1px solid rgba(255,255,255,.13);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}.top-title{font-size:.86rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.top-actions{display:flex;gap:9px}.btn{border:0;border-radius:8px;padding:9px 16px;font:700 .76rem Jost;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}.btn-back{background:#5BD3FF;color:#07172f}.btn-pdf{background:#fff;color:var(--navy)}.btn-proposal{background:linear-gradient(135deg,#C9A84C,#e8c96a);color:var(--navy)}.progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,#5BD3FF,#6EE7A8);width:0;z-index:100;transition:width .35s}.progress.running{animation:run 14s ease-out forwards}.progress.done{width:100%;opacity:0}@keyframes run{0%{width:0}45%{width:58%}75%{width:76%}100%{width:91%}}.shell{max-width:1080px;margin:auto;padding:28px 20px 80px}.loading{text-align:center;padding:90px 20px}.spinner{width:48px;height:48px;border:3px solid rgba(255,255,255,.14);border-top-color:#6EE7A8;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 18px}@keyframes spin{to{transform:rotate(360deg)}}.loading h2{font-size:1rem}.loading p{font-size:.8rem;color:#9db1c8;margin-top:8px}.error{max-width:700px;margin:30px auto;padding:24px;border:1px solid rgba(248,113,113,.35);background:rgba(248,113,113,.08);border-radius:14px;color:#ffd5d5}.executive-report{display:grid;gap:24px}.report-page{position:relative;background:#fff;color:var(--charcoal);border:1px solid var(--border);border-radius:18px;padding:46px 52px 60px;box-shadow:0 20px 55px rgba(0,0,0,.24);min-height:820px;overflow:hidden}.report-header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--navy);padding-bottom:14px;margin-bottom:28px}.report-brand{font-size:1rem;font-weight:900;letter-spacing:.08em;color:var(--navy)}.report-brand-sub{font-size:.68rem;text-transform:uppercase;letter-spacing:.16em;color:#617083;margin-top:3px}.report-id{text-align:right;font-size:.66rem;line-height:1.55;color:#64748b}.report-footer{position:absolute;left:52px;right:52px;bottom:22px;border-top:1px solid var(--border);padding-top:9px;display:flex;justify-content:space-between;font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:#64748b}.cover-page{display:flex;flex-direction:column;justify-content:center;text-align:center;background:linear-gradient(145deg,#fff,#f7f9fb)}.cover-logo{font-size:1.5rem;font-weight:900;letter-spacing:.13em;color:var(--navy)}.cover-intel{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);margin-top:7px}.cover-rule{width:96px;height:3px;background:var(--blue);margin:32px auto}.cover-kicker{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:#64748b}.cover-title{font-size:clamp(2.4rem,5vw,3.8rem);line-height:1.05;color:var(--navy);font-weight:800;margin:12px auto 28px;max-width:760px}.cover-meta{display:grid;grid-template-columns:1fr 1fr;gap:12px 28px;text-align:left;max-width:700px;margin:0 auto 30px;padding:22px 28px;background:#fff;border:1px solid var(--border);border-radius:14px}.cover-meta dt{font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;color:#728096}.cover-meta dd{font-size:.86rem;font-weight:700;color:var(--charcoal)}.cover-score{width:150px;height:150px;border-radius:50%;margin:0 auto 15px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:8px solid var(--blue);background:#fff}.cover-score strong{font-size:4.2rem;line-height:.9;color:var(--navy)}.cover-score span{font-size:.62rem;text-transform:uppercase;letter-spacing:.13em;color:#64748b;margin-top:8px}.cover-rec{display:inline-block;margin:auto;padding:11px 24px;border-radius:8px;font-size:1.35rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;background:#eef3f8;color:var(--navy);border:1px solid var(--border)}.confidence{display:inline-flex;padding:5px 10px;border-radius:999px;background:#eaf1f8;color:var(--navy);font-size:.68rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase}.page-title{font-size:2.15rem;line-height:1.08;color:var(--navy);font-weight:800;margin-bottom:8px}.page-deck{font-size:.86rem;color:#64748b;margin-bottom:26px}.rec-banner{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:22px 26px;border-radius:13px;margin-bottom:24px;border-left:8px solid var(--blue);background:var(--light)}.rec-banner.pursue{border-left-color:var(--green)}.rec-banner.conditional{border-left-color:var(--amber)}.rec-banner.no-bid{border-left-color:var(--red)}.rec-label{font-size:.64rem;text-transform:uppercase;letter-spacing:.13em;color:#64748b}.rec-value{font-size:1.55rem;font-weight:900;color:var(--navy);text-transform:uppercase}.executive-copy{display:grid;gap:12px;font-size:.92rem;line-height:1.62;margin-bottom:24px}.report-table{width:100%;border-collapse:collapse;font-size:.78rem;margin:12px 0 24px}.report-table th{background:var(--navy);color:#fff;text-align:left;padding:10px 12px;font-size:.66rem;text-transform:uppercase;letter-spacing:.08em}.report-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top}.report-table tr:nth-child(even) td{background:#f8fafc}.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}.metric-card{border:1px solid var(--border);border-radius:12px;padding:15px;background:#fff;min-height:92px}.metric-label{font-size:.59rem;letter-spacing:.1em;text-transform:uppercase;color:#64748b;margin-bottom:7px}.metric-value{font-size:1rem;font-weight:850;color:var(--navy)}.section-block{border:1px solid var(--border);border-radius:13px;padding:18px 20px;margin-bottom:14px;background:#fff}.section-block h3{font-size:1rem;color:var(--navy);font-weight:800;margin-bottom:7px;display:flex;gap:9px;align-items:center}.dot{width:11px;height:11px;border-radius:50%;background:var(--blue);flex:0 0 auto}.good{background:var(--green)}.warn{background:var(--amber)}.risk{background:var(--red)}.section-summary{font-weight:700;color:#354255;margin-bottom:6px}.section-detail{font-size:.82rem;line-height:1.55;color:#566476}.risk-low{color:var(--green);font-weight:800}.risk-medium{color:#987100;font-weight:800}.risk-high{color:var(--red);font-weight:800}.risk-info{color:var(--blue);font-weight:800}.plan-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:22px}.plan-card{background:var(--light);border:1px solid var(--border);border-radius:11px;padding:15px}.plan-card h3{font-size:.78rem;color:var(--navy);font-weight:800;margin-bottom:5px}.plan-card p{font-size:.76rem;color:#5c6879;line-height:1.45}.check-cell{font-size:1.05rem;color:var(--blue)}.action-columns{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:22px 0}.action-column{border-top:4px solid var(--blue);background:var(--light);padding:16px;border-radius:7px}.action-column h3{font-size:.82rem;color:var(--navy);font-weight:850;margin-bottom:8px}.action-column ul{padding-left:17px;font-size:.76rem;line-height:1.55;color:#526173}.co-questions{counter-reset:q;display:grid;gap:9px}.co-question{counter-increment:q;display:flex;gap:10px;padding:11px 13px;background:#f8fafc;border:1px solid var(--border);border-radius:9px;font-size:.78rem}.co-question:before{content:counter(q);width:22px;height:22px;border-radius:50%;display:grid;place-items:center;background:var(--navy);color:#fff;font-size:.65rem;font-weight:800;flex:0 0 auto}.report-actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:26px}.trust{text-align:center;font-size:.75rem;color:#9db1c8;margin-top:14px;font-style:italic}@media(max-width:760px){.top{align-items:flex-start}.top-actions{flex-wrap:wrap;justify-content:flex-end}.report-page{padding:30px 24px 56px;min-height:auto}.report-footer{left:24px;right:24px}.cover-meta,.metric-grid,.plan-grid,.action-columns{grid-template-columns:1fr}.report-header{gap:12px}.report-id{font-size:.58rem}.cover-title{font-size:2.35rem}.cover-score{width:125px;height:125px}.cover-score strong{font-size:3.4rem}}
@page{size:letter portrait;margin:.45in}@media print{html,body{background:#fff!important;color:var(--charcoal)!important;font-size:10.5pt!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}.top,.progress,.loading,.report-actions,.trust{display:none!important}.shell{max-width:none!important;margin:0!important;padding:0!important}.executive-report{display:block!important}.report-page{width:100%!important;min-height:9.7in!important;border:0!important;border-radius:0!important;box-shadow:none!important;padding:.35in .42in .48in!important;margin:0!important;page-break-after:always!important;break-after:page!important;overflow:visible!important}.report-page:last-child{page-break-after:auto!important;break-after:auto!important}.report-footer{left:.42in!important;right:.42in!important}.section-block,.metric-card,.plan-card,.rec-banner,.report-table tr,.action-column,.co-question{break-inside:avoid!important;page-break-inside:avoid!important}a,a:visited{color:inherit!important;text-decoration:none!important}}

<body>
<div class="progress" id="progress"></div>
<div class="top"><div class="top-title" id="topTitle">Executive Opportunity Assessment</div><div class="top-actions"><a class="btn btn-back" id="backBtn" href="/opportunity">← Back</a><button class="btn btn-pdf" id="pdfBtn" style="display:none" onclick="window.print()">Export Executive PDF ↓</button></div></div>
<main class="shell"><div class="loading" id="loading"><div class="spinner"></div><h2 id="loadingTitle">Preparing executive opportunity assessment…</h2><p>Evaluating fit, eligibility, risk, compliance, and proposal readiness.</p></div><div id="report"></div></main>
<script>
'use strict';
const q=new URLSearchParams(location.search);const noticeId=q.get('id')||'';const token=q.get('t')||localStorage.getItem('demo_view_token')||'';const session=JSON.parse(sessionStorage.getItem('capgen_session')||'null');const sessionToken=session?.session_token||'';const betaToken=token.startsWith('beta_')?token:'';let opp=JSON.parse(sessionStorage.getItem('analyze_opp')||'null');let profile={};let polling=null;
const progress=document.getElementById('progress');const loading=document.getElementById('loading');const report=document.getElementById('report');document.getElementById('backBtn').href=token?'/opportunity?t='+encodeURIComponent(token):'/opportunity';
function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}function fmtDate(v){if(!v)return'Not specified';const d=new Date(v);return isNaN(d)?String(v):d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}function days(v){if(!v)return null;return Math.ceil((new Date(v)-new Date())/86400000)}function arr(v){return Array.isArray(v)?v:[]}function first(a,f){return a?.length?String(a[0]?.item||a[0]):f}function recText(r){return r==='BID'?'PURSUE':r==='CONDITIONAL'?'PURSUE WITH CONDITIONS':r==='NO_BID'?'DO NOT PURSUE':'ASSESSMENT PENDING'}function recClass(r){return r==='BID'?'pursue':r==='CONDITIONAL'?'conditional':'no-bid'}function safe(v,f='Not enough information was available to complete this section.'){return esc(v||f)}
async function loadContext(){if(token&&!betaToken){try{const r=await fetch('/.netlify/functions/demo-pipeline?t='+encodeURIComponent(token));if(r.ok){const d=await r.json();profile=d.profile||d.business||d.snapshot?.profile||{};if(!opp&&Array.isArray(d.opportunities))opp=d.opportunities.find(x=>(x.notice_id||x.noticeId||x.id)===noticeId)||null}}catch{}}if(!opp&&noticeId){try{const r=await fetch('https://judislfknmhofcgzyozc.supabase.co/rest/v1/sam_opportunities?notice_id=eq.'+encodeURIComponent(noticeId)+'&select=title,agency,naics_code,set_aside,response_deadline,solicitation_number,raw&limit=1',{headers:{apikey:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInJlZiI6Imp1ZGlzbGZrbm1ob2ZjZ3p5b3pjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMDI3ODAsImV4cCI6MjA5Mjc3ODc4MH0.Kxpe0kJt0k7ZchYu70BOwm4KdT0C5aSsyeR1ov6NlQ0'});const a=await r.json();if(a[0])opp={title:a[0].title,agency:a[0].agency,naics:a[0].naics_code,set_aside:a[0].set_aside,response_deadline:a[0].response_deadline,solicitation_number:a[0].solicitation_number,...(a[0].raw||{})}}catch{}}if(opp?.title)document.getElementById('topTitle').textContent=opp.title.slice(0,90)}
async function analyze(force=false){if(!noticeId){showError('No opportunity identifier was supplied.');return}if(!sessionToken&&!token){showError('A valid personalized dashboard link is required.');return}progress.classList.add('running');const payload={opportunityId:noticeId,force,deep:true,view_token:token||undefined,beta_token:betaToken||undefined,opportunity:opp?{title:opp.title,agency:opp.agency,naics:opp.naics||opp.naics_code,set_aside:opp.set_aside,deadline:opp.response_deadline||opp.deadline,solicitation_number:opp.solicitation_number}:undefined};try{const r=await fetch('/.netlify/functions/analyze-fit',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+sessionToken},body:JSON.stringify(payload)});const d=await r.json();if(!r.ok){showError(d.message||d.error||'Analysis could not be completed.');return}if(d.status==='complete'&&d.stage2){render(d);return}if(d.status==='stage1_complete'&&d.stage1){document.getElementById('loadingTitle').textContent='Executive recommendation complete. Building detailed assessment…'}polling=setTimeout(()=>analyze(false),1800)}catch(e){showError(e.message)}}
function showError(m){clearTimeout(polling);progress.classList.remove('running');loading.style.display='none';report.innerHTML='<div class="error"><strong>Assessment unavailable</strong><p style="margin-top:8px">'+esc(m)+'</p></div>'}
function header(page,id,date){return`<div class="report-header"><div><div class="report-brand">APROPOS GROUP LLC</div><div class="report-brand-sub">Government Opportunity Intelligence</div></div><div class="report-id">Assessment ID: ${esc(id)}<br>Prepared: ${esc(date)}<br>Page ${page} of 6</div></div>`}function footer(){return'<div class="report-footer"><span>CONFIDENTIAL</span><span>Prepared by APROPOS GROUP LLC</span></div>'}function metric(l,v){return`<div class="metric-card"><div class="metric-label">${esc(l)}</div><div class="metric-value">${esc(v)}</div></div>`}function section(t,s,d,c=''){return`<div class="section-block"><h3><span class="dot ${c}"></span>${esc(t)}</h3><div class="section-summary">${esc(s)}</div><div class="section-detail">${safe(d)}</div></div>`}function list(a,f){const x=arr(a);return x.length?'<ul>'+x.slice(0,6).map(i=>'<li>'+esc(i?.item||i)+'</li>').join('')+'</ul>':'<p>'+esc(f)+'</p>'}
function render(row){clearTimeout(polling);progress.classList.add('done');loading.style.display='none';const s1=row.stage1||{},s2=row.stage2||{},m=s1.match||{},r=row.recommendation||'PENDING',score=Number(row.fit_score||0),src=opp||{};const title=src.title||s1._title||noticeId,agency=src.agency||s1._agency||'Not specified',naics=src.naics||src.naics_code||s1._naics||'Not specified',setAside=src.set_aside||s1._set_aside||'Unrestricted',deadline=src.response_deadline||src.deadline||s1._deadline||null,solicitation=src.solicitation_number||src.solicitationNumber||noticeId;const client=profile.legal_name||profile.business_name||profile.name||session?.business_name||'Client Organization';const date=new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}),id='AGA-'+new Date().getFullYear()+'-'+String(row.id||noticeId).replace(/[^a-z0-9]/gi,'').slice(-8).toUpperCase();const confidence=Object.keys(s2).length>=4?'High':Object.keys(s1).length>=3?'Moderate':'Preliminary',fit=score>=80?'Strong':score>=60?'Moderate':'Limited',elig=m.set_aside_eligible===false?'Not Confirmed':'Aligned',competition=/none|unrestricted/i.test(setAside)?'Open Competition':'Restricted Field',past=m.capability_alignment==='HIGH'?'Strong':m.capability_alignment==='MEDIUM'?'Moderate':'Needs Support',riskLevel=r==='NO_BID'?'High':r==='CONDITIONAL'?'Medium':'Low–Medium',docs=arr(s2.documents_needed),required=arr(s2.required_work),staffing=arr(s2.staffing_delivery),pricing=arr(s2.pricing_considerations),checklist=arr(s2.proposal_checklist),questions=arr(s2.questions_for_co),complexity=docs.length>6?'High':docs.length>3?'Moderate':'Standard',probability=score>=85?'Favorable':score>=65?'Competitive':'Challenging',dleft=days(deadline),summary=s1.opportunity_summary||'This assessment evaluates the opportunity against the contractor’s registered capability profile, eligibility indicators, delivery readiness, and available solicitation information.',rationale=s1.rationale||'The recommendation reflects capability alignment, eligibility, timing, compliance burden, and execution risk.';const cls=recClass(r),label=recText(r);let h='<div class="executive-report">';h+=`<section class="report-page cover-page"><div class="cover-logo">APROPOS GROUP LLC</div><div class="cover-intel">Government Opportunity Intelligence</div><div class="cover-rule"></div><div class="cover-kicker">Executive Opportunity Assessment</div><div class="cover-title">Opportunity Fit Assessment</div><dl class="cover-meta"><div><dt>Prepared For</dt><dd>${esc(client)}</dd></div><div><dt>Prepared Date</dt><dd>${esc(date)}</dd></div><div><dt>Opportunity</dt><dd>${esc(title)}</dd></div><div><dt>Agency</dt><dd>${esc(agency)}</dd></div><div><dt>Solicitation</dt><dd>${esc(solicitation)}</dd></div><div><dt>Assessment ID</dt><dd>${esc(id)}</dd></div></dl><div class="cover-score"><strong>${score||'—'}</strong><span>Fit Score</span></div><div class="cover-rec">${esc(label)}</div><div style="margin-top:12px"><span class="confidence">Executive Confidence: ${esc(confidence)}</span></div>${footer()}</section>`;h+=`<section class="report-page">${header(2,id,date)}<h1 class="page-title">Executive Decision Summary</h1><div class="page-deck">A concise decision view for executives, capture leaders, and proposal managers.</div><div class="rec-banner ${cls}"><div><div class="rec-label">Executive Recommendation</div><div class="rec-value">${esc(label)}</div></div><span class="confidence">Confidence: ${esc(confidence)}</span></div><div class="executive-copy"><p>${safe(summary)}</p><p>${safe(rationale)}</p></div><table class="report-table"><thead><tr><th colspan="2">Opportunity Overview</th></tr></thead><tbody><tr><td>Agency</td><td>${esc(agency)}</td></tr><tr><td>Contract Type</td><td>${esc(src.contract_type||src.type||'Verify in solicitation')}</td></tr><tr><td>NAICS</td><td>${esc(naics)}</td></tr><tr><td>Set Aside</td><td>${esc(setAside)}</td></tr><tr><td>Response Due</td><td>${esc(fmtDate(deadline))}${dleft!==null?' · '+dleft+' days remaining':''}</td></tr><tr><td>Estimated Value</td><td>${esc(src.estimated_value||src.award_amount||'Not publicly stated')}</td></tr><tr><td>Contract Length</td><td>${esc(src.contract_length||src.period_of_performance||'Verify in solicitation')}</td></tr><tr><td>Location</td><td>${esc(src.place_of_performance||src.location||'See official notice')}</td></tr><tr><td>Source</td><td>Official government procurement notice</td></tr></tbody></table><div class="metric-grid">${metric('Opportunity Fit',fit)}${metric('Eligibility',elig)}${metric('Competition',competition)}${metric('Past Performance',past)}${metric('Risk',riskLevel)}${metric('Proposal Complexity',complexity)}${metric('Probability',probability)}${metric('Confidence',confidence)}</div>${footer()}</section>`;h+=`<section class="report-page">${header(3,id,date)}<h1 class="page-title">Fit Analysis</h1><div class="page-deck">The contractor-specific factors driving the opportunity recommendation.</div>${section('Why This Opportunity Fits',fit,m.naics_detail||summary,score>=70?'good':'warn')}${section('Business Strengths',m.capability_alignment||'Assessment Required',m.capability_detail||rationale,m.capability_alignment==='HIGH'?'good':'warn')}${section('Capability Alignment',m.capability_alignment||fit,m.capability_detail||m.naics_detail,score>=70?'good':'warn')}${section('Relevant Experience',past,first(required,'Review experience requirements against documented projects and references.'),past==='Strong'?'good':'warn')}${section('Staffing Readiness',staffing.length?'Requirements Identified':'Further Validation Required',first(staffing,'Confirm management, technical staffing, surge capacity, and key-person availability.'),staffing.length?'good':'warn')}${section('Past Performance',past,m.capability_detail||'Select references demonstrating comparable scope, complexity, and outcomes.',past==='Strong'?'good':'warn')}${footer()}</section>`;const compliance=docs.length>6?'High':docs.length>3?'Medium':'Low',schedule=dleft!==null&&dleft<=7?'High':dleft!==null&&dleft<=21?'Medium':'Low',price=pricing.length>3?'Medium':'Low',teaming=m.capability_alignment==='LOW'?'High':m.capability_alignment==='MEDIUM'?'Medium':'Low';h+=`<section class="report-page">${header(4,id,date)}<h1 class="page-title">Risk Assessment</h1><div class="page-deck">Priority risks requiring executive attention before proposal resources are committed.</div><table class="report-table"><thead><tr><th>Category</th><th>Rating</th><th>Executive Recommendation</th></tr></thead><tbody><tr><td>Compliance</td><td class="risk-${compliance.toLowerCase()}">${compliance}</td><td>${esc(first(docs,'Build a solicitation compliance matrix before drafting begins.'))}</td></tr><tr><td>Past Performance</td><td class="risk-${past==='Strong'?'low':'medium'}">${past==='Strong'?'Low':'Medium'}</td><td>Confirm references demonstrate comparable scope, value, complexity, and outcomes.</td></tr><tr><td>Schedule</td><td class="risk-${schedule.toLowerCase()}">${schedule}</td><td>${dleft!==null?dleft+' days remain. Establish a controlled proposal calendar immediately.':'Verify the response deadline and amendment schedule.'}</td></tr><tr><td>Pricing</td><td class="risk-${price.toLowerCase()}">${price}</td><td>${esc(first(pricing,'Validate labor, materials, indirect rates, escalation, and price-to-win assumptions.'))}</td></tr><tr><td>Teaming</td><td class="risk-${teaming.toLowerCase()}">${teaming}</td><td>${teaming==='High'?'Identify a qualified teaming partner before committing to pursue.':'Confirm whether subcontractors strengthen technical depth or past performance.'}</td></tr><tr><td>Information Quality</td><td class="risk-info">${confidence}</td><td>Resolve unanswered questions and review all amendments before final approval.</td></tr></tbody></table>${section('Risk-Control Priority','Executive Review Required','Validate eligibility, scope assumptions, mandatory documentation, price structure, and delivery capacity before authorizing full proposal production.','warn')}${footer()}</section>`;const tasks=checklist.length?checklist.slice(0,8):['Confirm bid/no-bid authorization','Build compliance matrix','Assign volume leads','Validate past-performance references','Complete pricing model','Conduct red-team review'];h+=`<section class="report-page">${header(5,id,date)}<h1 class="page-title">Proposal Development Plan</h1><div class="page-deck">A practical production framework for converting the pursuit decision into a compliant response.</div><div class="plan-grid"><div class="plan-card"><h3>Proposal Strategy</h3><p>${safe(s2.draft_technical_approach,'Lead with differentiators, a low-risk delivery approach, and direct alignment to evaluation factors.')}</p></div><div class="plan-card"><h3>Technical Volume</h3><p>${esc(first(required,'Map each technical requirement to a method, deliverable, metric, and proof point.'))}</p></div><div class="plan-card"><h3>Management Volume</h3><p>${esc(first(staffing,'Define governance, staffing, quality control, communications, and transition responsibilities.'))}</p></div><div class="plan-card"><h3>Pricing Volume</h3><p>${esc(first(pricing,'Create a traceable pricing model aligned with the solicitation structure.'))}</p></div><div class="plan-card"><h3>Compliance Documents</h3><p>${esc(first(docs,'Build a compliance matrix covering every instruction and attachment.'))}</p></div><div class="plan-card"><h3>Required Attachments</h3><p>Confirm forms, resumes, references, licenses, certifications, representations, and subcontracting documentation.</p></div></div><table class="report-table"><thead><tr><th>✓</th><th>Task</th><th>Responsible Party</th><th>Status</th><th>Target Date</th></tr></thead><tbody>${tasks.map((x,i)=>{const label=x?.item||x,owner=x?.owner_hint||['Executive Sponsor','Proposal Manager','Technical Lead','Past Performance Lead','Pricing Lead','Quality Reviewer'][i]||'Assigned Owner';return`<tr><td class="check-cell">☐</td><td>${esc(label)}</td><td>${esc(owner)}</td><td>Not Started</td><td>${deadline?fmtDate(new Date(new Date(deadline)-Math.max(2,8-i)*86400000)):'To Be Set'}</td></tr>`}).join('')}</tbody></table>${footer()}</section>`;const actions=required.slice(0,3).length?required.slice(0,3):['Confirm executive bid/no-bid authorization','Review the complete solicitation and amendments','Assign proposal leadership and volume owners'],risks=[docs[0]||'Mandatory compliance documentation',pricing[0]||'Pricing assumptions and competitiveness',staffing[0]||'Staffing and delivery capacity'],next=['Resolve open solicitation questions','Build the compliance and response calendar','Initiate proposal development after executive approval'];h+=`<section class="report-page">${header(6,id,date)}<h1 class="page-title">Executive Recommendation</h1><div class="page-deck">Final decision guidance and the immediate path forward.</div><div class="rec-banner ${cls}"><div><div class="rec-label">Recommendation</div><div class="rec-value">${esc(label)}</div></div><div style="font-size:2.1rem;font-weight:900;color:var(--navy)">${score||'—'}</div></div><div class="action-columns"><div class="action-column"><h3>Immediate Actions</h3>${list(actions,'Confirm the pursuit decision and assign accountable owners.')}</div><div class="action-column"><h3>Potential Risks</h3>${list(risks,'Validate compliance, pricing, delivery, and teaming risks.')}</div><div class="action-column"><h3>Recommended Next Steps</h3>${list(next,'Proceed through a controlled proposal-development process.')}</div></div><h2 style="font-size:1.2rem;color:var(--navy);margin:24px 0 12px">Questions for the Contracting Officer</h2><div class="co-questions">${(questions.length?questions.slice(0,8):['Please confirm the anticipated period of performance and option structure.','Are there incumbent-transition requirements or government-furnished resources?','Which evaluation factors will be weighted most heavily?']).map(x=>`<div class="co-question">${esc(x)}</div>`).join('')

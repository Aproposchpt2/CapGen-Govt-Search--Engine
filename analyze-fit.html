<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive Opportunity Assessment — APROPOS GROUP LLC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#09284a;
  --navy-2:#123d68;
  --gold:#b88a2d;
  --gold-2:#d6b15f;
  --gold-soft:#fbf5e7;
  --ink:#2a3542;
  --muted:#647181;
  --line:#d8dee6;
  --paper:#ffffff;
  --wash:#f4f6f8;
  --blue:#2f6f9f;
  --green:#237a52;
  --amber:#a87714;
  --red:#a83c45;
  --screen:#06172c;
  --shadow:0 24px 70px rgba(0,0,0,.28);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--screen);color:#fff;font-family:Inter,Arial,sans-serif;line-height:1.55}
button,a{font:inherit}
.progress{position:fixed;inset:0 auto auto 0;width:0;height:3px;z-index:100;background:linear-gradient(90deg,#63d6ff,#77e4b2);transition:width .3s ease,opacity .5s ease}
.progress.running{animation:progress-run 14s ease-out forwards}
.progress.done{width:100%;opacity:0}
@keyframes progress-run{0%{width:0}45%{width:58%}75%{width:78%}100%{width:92%}}
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:12px 22px;background:rgba(6,23,44,.96);border-bottom:1px solid rgba(255,255,255,.13);backdrop-filter:blur(12px)}
.topbar-title{min-width:0;font-weight:700;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-actions{display:flex;gap:9px;flex-wrap:wrap;justify-content:flex-end}
.button{display:inline-flex;align-items:center;justify-content:center;border:0;border-radius:8px;padding:9px 15px;text-decoration:none;font-weight:800;font-size:.76rem;cursor:pointer}
.button-back{background:#62d4ff;color:#06172c}
.button-print{background:#fff;color:var(--navy)}
.shell{max-width:1120px;margin:0 auto;padding:28px 18px 80px}
.loading{text-align:center;padding:90px 20px}
.spinner{width:50px;height:50px;border:3px solid rgba(255,255,255,.15);border-top-color:#77e4b2;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading h2{font-size:1rem;margin:0}.loading p{font-size:.82rem;color:#a3b3c8;margin:8px 0 0}
.error{max-width:720px;margin:32px auto;padding:24px;border:1px solid rgba(255,116,126,.38);background:rgba(255,116,126,.08);border-radius:14px;color:#ffe1e4}
.report{display:grid;gap:28px}
.report-page{position:relative;width:min(8.5in,100%);min-height:10.75in;margin:0 auto;background:var(--paper);color:var(--ink);padding:.54in .58in .65in;border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
.page-header{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:start;padding-bottom:11px;margin-bottom:22px;border-bottom:2px solid var(--gold)}
.header-brand{display:flex;align-items:center;gap:11px;min-width:0}
.header-logo{width:112px;height:auto;display:block}
.header-brand-copy{font-size:.62rem;line-height:1.35;text-transform:uppercase;letter-spacing:.14em;color:var(--navy);font-weight:800}
.header-brand-copy span{display:block;color:var(--gold);font-weight:700;margin-top:3px}
.header-meta{text-align:right;font-size:.58rem;line-height:1.5;text-transform:uppercase;letter-spacing:.07em;color:#687586}
.page-footer{position:absolute;left:.58in;right:.58in;bottom:.23in;display:flex;justify-content:space-between;gap:15px;padding-top:8px;border-top:1px solid var(--line);font-size:.55rem;text-transform:uppercase;letter-spacing:.08em;color:#6a7684}
.cover{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:linear-gradient(145deg,#ffffff 0%,#f7f8fa 65%,#f3ead5 150%)}
.cover:before{content:"";position:absolute;inset:0 0 auto 0;height:18px;background:linear-gradient(90deg,var(--navy),var(--gold),var(--navy))}
.cover-logo{width:min(360px,76%);height:auto;display:block;margin-bottom:22px}
.cover-kicker{font-size:.68rem;text-transform:uppercase;letter-spacing:.22em;color:var(--gold);font-weight:800}
.cover-title{font:700 clamp(2.35rem,6vw,3.8rem)/.98 "Cormorant Garamond",Georgia,serif;color:var(--navy);max-width:720px;margin:13px auto 10px}
.cover-subtitle{font-size:.82rem;text-transform:uppercase;letter-spacing:.15em;color:#667383;font-weight:700}
.cover-rule{width:92px;height:3px;background:var(--gold);margin:24px auto}
.cover-client{font:700 1.8rem/1.1 "Cormorant Garamond",Georgia,serif;color:var(--navy);margin-bottom:6px}
.cover-opportunity{max-width:700px;font-size:1rem;line-height:1.4;font-weight:700;color:#344253;margin-bottom:4px}
.cover-agency{font-size:.78rem;color:#677483}
.cover-decision{display:grid;grid-template-columns:145px minmax(300px,1fr);gap:30px;align-items:center;width:min(690px,100%);margin-top:30px}
.score-orb{width:145px;height:145px;border-radius:50%;display:grid;place-items:center;background:#fff;border:7px solid var(--gold);box-shadow:0 10px 28px rgba(9,40,74,.13)}
.score-orb strong{display:block;font-size:3.5rem;line-height:.85;color:var(--navy)}
.score-orb span{display:block;margin-top:8px;font-size:.58rem;text-transform:uppercase;letter-spacing:.12em;color:#6a7582;font-weight:800}
.decision-box{text-align:left;border:1px solid var(--gold-2);background:var(--gold-soft);padding:18px 22px}
.decision-box .label{font-size:.59rem;text-transform:uppercase;letter-spacing:.14em;color:#77602a;font-weight:800}
.decision-box .value{font:700 1.55rem/1.08 "Cormorant Garamond",Georgia,serif;color:var(--navy);text-transform:uppercase;margin-top:5px}
.cover-note{margin-top:18px;font-size:.67rem;color:#6f7a87}
.page-number{font-size:.72rem;color:var(--gold);font-weight:800;letter-spacing:.12em;margin-bottom:3px}
.page-title{font:700 2.05rem/1.02 "Cormorant Garamond",Georgia,serif;color:var(--navy);margin:0}
.page-deck{max-width:650px;margin:7px 0 19px;font-size:.78rem;line-height:1.55;color:#657283}
.gold-rule{height:1px;background:linear-gradient(90deg,var(--gold),transparent);margin:0 0 18px}
.executive-summary{border:1px solid var(--line);border-top:4px solid var(--gold);background:#fff;padding:16px 18px;margin-bottom:16px}
.eyebrow{font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;color:var(--gold);font-weight:800;margin-bottom:6px}
.body-copy{font-size:.88rem;line-height:1.62;color:#3a4653}
.body-copy p{margin:0 0 10px}.body-copy p:last-child{margin-bottom:0}
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:14px 0 16px}
.metric-card{min-height:82px;padding:11px 12px;border:1px solid var(--line);background:#fff;border-top:3px solid var(--blue)}
.metric-card.gold{border-top-color:var(--gold)}.metric-card.green{border-top-color:var(--green)}.metric-card.amber{border-top-color:var(--amber)}.metric-card.red{border-top-color:var(--red)}
.metric-label{font-size:.55rem;line-height:1.25;text-transform:uppercase;letter-spacing:.08em;color:#6a7582;font-weight:800}
.metric-value{font-size:1rem;line-height:1.18;color:var(--navy);font-weight:800;margin-top:6px}
.metric-note{font-size:.59rem;line-height:1.2;color:#6d7886;margin-top:4px;text-transform:uppercase;font-weight:700}
.report-table{width:100%;border-collapse:collapse;margin:11px 0 15px;font-size:.72rem;line-height:1.42}
.report-table th{background:var(--navy);color:#fff;text-align:left;padding:8px 9px;font-size:.58rem;text-transform:uppercase;letter-spacing:.06em}
.report-table td{padding:8px 9px;border:1px solid var(--line);vertical-align:top;background:#fff}
.report-table tr:nth-child(even) td{background:#f7f8fa}
.report-table .field{width:20%;color:#667383;font-weight:700}
.callout{display:flex;gap:10px;align-items:flex-start;padding:12px 14px;border-left:5px solid var(--gold);background:var(--gold-soft);font-size:.75rem;line-height:1.48;color:#3c4855}
.callout strong{color:var(--navy)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.panel{border:1px solid var(--line);background:#fff;padding:14px 15px}
.panel-title{font-size:.67rem;text-transform:uppercase;letter-spacing:.08em;color:var(--navy);font-weight:800;margin-bottom:8px}
.panel p,.panel li{font-size:.76rem;line-height:1.52;color:#465462}
.panel ul{padding-left:17px;margin:0}.panel li+li{margin-top:5px}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.status-card{border:1px solid var(--line);padding:12px 13px;background:#fff;min-height:107px}
.status-head{display:flex;align-items:center;gap:8px;font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;color:var(--navy);font-weight:800}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex:0 0 auto}
.status-card.good .status-dot{background:var(--green)}.status-card.warn .status-dot{background:var(--amber)}.status-card.bad .status-dot{background:var(--red)}
.status-value{display:inline-block;margin:7px 0 5px;padding:2px 6px;background:#eef3f7;color:var(--blue);font-size:.62rem;font-weight:800;text-transform:uppercase}
.status-card.good .status-value{background:#eaf5ef;color:var(--green)}.status-card.warn .status-value{background:#fff4d9;color:#8b6511}.status-card.bad .status-value{background:#fae8ea;color:var(--red)}
.status-detail{font-size:.72rem;line-height:1.45;color:#4e5b69}
.status-note{font-size:.66rem;line-height:1.42;color:#707b87;font-style:italic;margin-top:5px}
.capability-table{font-size:.66rem}.capability-table th,.capability-table td{padding:7px 7px}
.rating{font-weight:800;text-transform:uppercase}.rating.strong{color:var(--green)}.rating.partial{color:#9a7017}.rating.gap{color:var(--red)}
.quadrant{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.quad-card{border:1px solid var(--line);padding:14px 15px;min-height:155px;background:#fff}
.quad-card h3{font-size:.72rem;margin:0 0 8px;text-transform:uppercase;letter-spacing:.08em;color:var(--navy)}
.quad-tag{display:inline-block;margin-bottom:8px;padding:2px 7px;background:#eef3f7;color:var(--blue);font-size:.58rem;font-weight:800;text-transform:uppercase}
.quad-card ul{margin:0;padding-left:17px}.quad-card li{font-size:.74rem;line-height:1.48;color:#465462}.quad-card li+li{margin-top:4px}
.risk-register td:nth-child(2){font-weight:800;text-transform:uppercase}.risk-low{color:var(--green)}.risk-medium{color:#987019}.risk-high{color:var(--red)}.risk-info{color:var(--blue)}
.observation-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.observation{border-left:4px solid var(--gold);background:#f7f8fa;padding:13px 14px;min-height:126px}
.observation h3{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--navy);margin:0 0 6px}
.observation p{font-size:.74rem;line-height:1.48;color:#475563;margin:0}
.decision-banner{display:flex;align-items:center;justify-content:space-between;gap:24px;padding:16px 18px;border:1px solid var(--gold-2);background:var(--gold-soft);margin-bottom:13px}
.decision-banner .label{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:#77602a;font-weight:800}
.decision-banner .value{font:700 1.55rem/1 "Cormorant Garamond",Georgia,serif;color:var(--navy);text-transform:uppercase;margin-top:4px}
.decision-banner .score{font:700 2rem/1 "Cormorant Garamond",Georgia,serif;color:var(--gold)}
.factor-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.factor{border:1px solid var(--line);padding:13px;background:#fff;min-height:170px}
.factor h3{font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;margin:0 0 8px;color:var(--navy)}
.factor.go{border-top:4px solid var(--green)}.factor.stop{border-top:4px solid var(--red)}.factor.conditional{border-top:4px solid var(--gold)}
.factor ul{margin:0;padding-left:17px}.factor li{font-size:.72rem;line-height:1.48;color:#465462}.factor li+li{margin-top:5px}
.review-grid{display:grid;grid-template-columns:repeat(3,1fr);margin-top:12px;border:1px solid var(--line)}
.review-item{padding:9px 10px;font-size:.67rem;font-weight:700;color:#40505f;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
.review-item:nth-child(3n){border-right:0}.review-item:nth-last-child(-n+3){border-bottom:0}.review-item:before{content:"●";color:var(--blue);margin-right:6px}
.flow{display:grid;grid-template-columns:repeat(4,1fr);margin-top:12px}
.flow-step{padding:9px 8px;text-align:center;border:1px solid var(--line);border-right:0;font-size:.64rem;font-weight:800;color:#526170;background:#f7f8fa}
.flow-step:last-child{border-right:1px solid var(--line);background:var(--navy);color:#fff}
.action-columns{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:13px}
.action-column{border:1px solid var(--line);border-top:4px solid var(--blue);padding:12px 13px;background:#fff;min-height:178px}
.action-column:nth-child(2){border-top-color:var(--gold)}.action-column:nth-child(3){border-top-color:var(--navy)}
.action-column h3{font-size:.67rem;text-align:center;text-transform:uppercase;letter-spacing:.06em;color:var(--navy);margin:0 0 8px}
.action-column ul{margin:0;padding-left:17px}.action-column li{font-size:.69rem;line-height:1.48;color:#485664}.action-column li+li{margin-top:4px}
.checklist-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px 16px;margin:10px 0 14px}
.check-item{font-size:.72rem;color:#465462}.check-item:before{content:"☐";color:var(--blue);font-size:.9rem;margin-right:7px}
.approval-box{margin-top:14px;border:2px solid var(--navy);padding:17px 18px;background:#fff}
.approval-title{font:700 1.35rem/1.05 "Cormorant Garamond",Georgia,serif;color:var(--navy);margin-bottom:9px}
.approval-options{display:flex;flex-wrap:wrap;gap:18px;font-size:.72rem;font-weight:800;color:#3f4c59;margin-bottom:16px}
.signature-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:18px}
.signature{border-top:1px solid #7d8792;padding-top:4px;font-size:.58rem;text-transform:uppercase;color:#6b7682}
.limitations{font-size:.69rem;line-height:1.5;color:#52606e}
.source-list{margin:8px 0 0;padding-left:18px}.source-list li{font-size:.69rem;line-height:1.48;color:#52606e}.source-list li+li{margin-top:4px}
.report-actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:26px}
.trust{text-align:center;margin-top:13px;font-size:.74rem;color:#9fb0c5;font-style:italic}
@media(max-width:760px){
  .topbar{align-items:flex-start}.report-page{padding:30px 23px 58px;min-height:auto}.page-footer{left:23px;right:23px}.page-header{grid-template-columns:1fr}.header-meta{text-align:left}.metric-grid,.three-col,.factor-grid,.action-columns{grid-template-columns:1fr}.two-col,.status-grid,.quadrant,.observation-grid{grid-template-columns:1fr}.cover-decision{grid-template-columns:1fr;justify-items:center}.decision-box{text-align:center;width:100%}.review-grid{grid-template-columns:1fr}.review-item{border-right:0}.flow{grid-template-columns:1fr}.flow-step{border-right:1px solid var(--line);border-bottom:0}.flow-step:last-child{border-bottom:1px solid var(--line)}.signature-grid{grid-template-columns:1fr}.header-logo{width:145px}}
@page{size:Letter portrait;margin:0}
@media print{
  html,body{background:#fff!important;color:var(--ink)!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .topbar,.progress,.loading,.report-actions,.trust{display:none!important}
  .shell{max-width:none!important;margin:0!important;padding:0!important}
  .report{display:block!important}
  .report-page{width:8.5in!important;min-height:11in!important;height:11in!important;margin:0!important;padding:.47in .5in .58in!important;border:0!important;border-radius:0!important;box-shadow:none!important;page-break-after:always!important;break-after:page!important;overflow:hidden!important}
  .report-page:last-child{page-break-after:auto!important;break-after:auto!important}
  .page-footer{left:.5in!important;right:.5in!important;bottom:.18in!important}
  .body-copy{font-size:10.4pt!important}.report-table{font-size:8.8pt!important}.panel p,.panel li,.quad-card li,.observation p,.factor li,.action-column li,.check-item{font-size:8.8pt!important}.status-detail{font-size:8.7pt!important}.status-note{font-size:8pt!important}

  .summary-page .page-header{margin-bottom:14px!important}.summary-page .page-deck{margin-bottom:11px!important}.summary-page .gold-rule{margin-bottom:12px!important}.summary-page .executive-summary{padding:12px 14px;margin-bottom:10px}.summary-page .body-copy{font-size:9.7pt!important;line-height:1.48!important}.summary-page .metric-grid{gap:7px;margin:10px 0}.summary-page .metric-card{min-height:68px;padding:8px 9px}.summary-page .metric-value{font-size:11pt}.summary-page .metric-note{font-size:6.9pt}.summary-page .report-table{margin:8px 0 9px}.summary-page .report-table th,.summary-page .report-table td{padding:5px 7px}.summary-page .callout{padding:8px 10px;font-size:8.1pt;line-height:1.3}
  .observations-page .page-header{margin-bottom:15px!important}.observations-page .page-deck{margin-bottom:12px!important}.observations-page .gold-rule{margin-bottom:12px!important}.observations-page .observation{min-height:110px;padding:10px 11px}.observations-page .observation p,.observations-page .observation li{font-size:8.2pt!important;line-height:1.35!important}.observations-page .callout{padding:9px 11px;font-size:8.2pt;line-height:1.35}
  .metric-card,.status-card,.panel,.quad-card,.observation,.factor,.action-column,.report-table tr,.callout{break-inside:avoid!important;page-break-inside:avoid!important}
}
</style>
</head>
<body>
<div class="progress" id="progress"></div>
<header class="topbar">
  <div class="topbar-title" id="topTitle">Executive Opportunity Assessment</div>
  <div class="topbar-actions">
    <a class="button button-back" id="backBtn" href="/opportunity">← Back</a>
    <button class="button button-print" id="printBtn" style="display:none" onclick="window.print()">Export Premium PDF ↓</button>
  </div>
</header>
<main class="shell">
  <section class="loading" id="loading">
    <div class="spinner"></div>
    <h2 id="loadingTitle">Preparing the executive opportunity dossier…</h2>
    <p>Evaluating alignment, eligibility, evidence, competition, risk, and resource readiness.</p>
  </section>
  <div id="report"></div>
</main>

const sessionToken=session?.session_token||'';
const betaToken=token.startsWith('beta_')?token:'';
let opp=JSON.parse(sessionStorage.getItem('analyze_opp')||'null');
let profile={};
let polling=null;
const progress=document.getElementById('progress');
const loading=document.getElementById('loading');
const report=document.getElementById('report');
document.getElementById('backBtn').href=token?'/opportunity?t='+encodeURIComponent(token):'/opportunity';

function esc(value){return String(value??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
function arr(value){return Array.isArray(value)?value:[]}
function itemText(value){return String(value?.item??value??'').trim()}
function field(...values){for(const value of values){if(value!==undefined&&value!==null&&String(value).trim()!=='')return value}return''}
function clip(value,max=340){const text=String(value||'').replace(/\s+/g,' ').trim();return text.length>max?text.slice(0,max-1).trim()+'…':text}
function fmtDate(value){if(!value)return'Not specified';const d=new Date(value);return Number.isNaN(d.getTime())?String(value):d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}
function daysRemaining(value){if(!value)return null;const d=new Date(value);if(Number.isNaN(d.getTime()))return null;return Math.ceil((d-new Date())/86400000)}
function recText(rec){return rec==='BID'?'PURSUE':rec==='CONDITIONAL'?'PURSUE WITH CONDITIONS':rec==='NO_BID'?'DO NOT PURSUE':'ASSESSMENT PENDING'}
function listItems(values,fallback,max=5){const out=arr(values).map(itemText).filter(Boolean).slice(0,max);if(!out.length&&fallback)out.push(fallback);return out}
function listHtml(values,fallback,max=5){return'<ul>'+listItems(values,fallback,max).map(v=>'<li>'+esc(clip(v,220))+'</li>').join('')+'</ul>'}
function unique(values){return [...new Set(values.filter(Boolean).map(v=>String(v).trim()).filter(Boolean))]}
function riskClass(level){return level==='High'?'risk-high':level==='Medium'?'risk-medium':level==='Low'?'risk-low':'risk-info'}
function level(score,high=75,medium=55){return score>=high?'Strong':score>=medium?'Moderate':'Limited'}
function statusTone(value){return /strong|aligned|eligible|active|confirmed|available|low/i.test(value)?'good':/gap|ineligible|failed|high risk|not qualified/i.test(value)?'bad':'warn'}
function placeOfPerformance(src){const raw=src.raw||{};const pop=raw.placeOfPerformance||raw.place_of_performance||{};const city=field(pop?.city?.name,pop?.city,src.city);const state=field(pop?.state?.code,pop?.state,src.state);return [city,state].filter(Boolean).join(', ')||field(src.place_of_performance,src.location,'See official notice')}
function assessmentId(row){return'AGA-'+new Date().getFullYear()+'-'+String(row.id||noticeId||Date.now()).replace(/[^a-z0-9]/gi,'').slice(-8).toUpperCase()}
function safeText(value,fallback='Not enough information was available to complete this finding.'){return esc(clip(value||fallback,560))}

async function loadContext(){
  if(token&&!betaToken){
    try{
      const response=await fetch('/.netlify/functions/demo-pipeline?t='+encodeURIComponent(token));
      if(response.ok){
        const data=await response.json();
        profile=data.profile||data.business||data.snapshot?.profile||{};
        if(!opp&&Array.isArray(data.opportunities))opp=data.opportunities.find(x=>(x.notice_id||x.noticeId||x.id)===noticeId)||null;
      }
    }catch{}
  }
  if(!opp&&noticeId){
    try{
      const response=await fetch('https://judislfknmhofcgzyozc.supabase.co/rest/v1/sam_opportunities?notice_id=eq.'+encodeURIComponent(noticeId)+'&select=title,agency,naics_code,set_aside,response_deadline,solicitation_number,raw&limit=1',{headers:{apikey:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInJlZiI6Imp1ZGlzbGZrbm1ob2ZjZ3p5b3pjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMDI3ODAsImV4cCI6MjA5Mjc3ODc4MH0.Kxpe0kJt0k7ZchYu70BOwm4KdT0C5aSsyeR1ov6NlQ0'}});
      const rows=await response.json();
      if(rows[0])opp={title:rows[0].title,agency:rows[0].agency,naics:rows[0].naics_code,set_aside:rows[0].set_aside,response_deadline:rows[0].response_deadline,solicitation_number:rows[0].solicitation_number,...(rows[0].raw||{}),raw:rows[0].raw||{}};
    }catch{}
  }
  if(opp?.title)document.getElementById('topTitle').textContent=opp.title.slice(0,100);
}

async function analyze(force=false){
  if(!noticeId){showError('No opportunity identifier was supplied.');return}
  if(!sessionToken&&!token){showError('A valid personalized dashboard link is required.');return}
  progress.classList.add('running');
  const payload={opportunityId:noticeId,force,deep:true,view_token:token||undefined,beta_token:betaToken||undefined,opportunity:opp?{title:opp.title,agency:opp.agency,naics:opp.naics||opp.naics_code,set_aside:opp.set_aside,deadline:opp.response_deadline||opp.deadline,solicitation_number:opp.solicitation_number}:undefined};
  try{
    const response=await fetch('/.netlify/functions/analyze-fit',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+sessionToken},body:JSON.stringify(payload)});
    const data=await response.json();
    if(!response.ok){showError(data.message||data.error||'Analysis could not be completed.');return}
    if(data.status==='failed'){showError(data.stage1?.error||'The assessment process failed.');return}
    if(data.status==='complete'&&data.stage1){render(data);return}
    if(data.status==='stage1_complete'&&data.stage1)document.getElementById('loadingTitle').textContent='Executive recommendation complete. Building the premium decision dossier…';
    polling=setTimeout(()=>analyze(false),1800);
  }catch(error){showError(error.message)}
}

function showError(message){
  clearTimeout(polling);
  progress.classList.remove('running');
  loading.style.display='none';
  report.innerHTML='<div class="error"><strong>Assessment unavailable</strong><p style="margin:8px 0 0">'+esc(message)+'</p></div>';
}

function pageHeader(page,total,id,date){
  return`<div class="page-header"><div class="header-brand"><img class="header-logo" src="${BRAND_LOGO}" alt="APROPOS GROUP LLC"><div class="header-brand-copy">Executive Opportunity Assessment<span>Government Opportunity Intelligence</span></div></div><div class="header-meta">Assessment ${esc(id)}<br>Prepared ${esc(date)}<br>Page ${page} of ${total}</div></div>`;
}
function pageFooter(){return'<div class="page-footer"><span>APROPOS GROUP LLC · CONFIDENTIAL</span><span>Executive Decision Support</span></div>'}
function metricCard(label,value,note,tone=''){return`<div class="metric-card ${tone}"><div class="metric-label">${esc(label)}</div><div class="metric-value">${esc(value)}</div><div class="metric-note">${esc(note)}</div></div>`}
function statusCard(title,value,detail,note){const tone=statusTone(value);return`<div class="status-card ${tone}"><div class="status-head"><span class="status-dot"></span>${esc(title)}</div><div class="status-value">${esc(value)}</div><div class="status-detail">${safeText(detail)}</div><div class="status-note">Executive note: ${safeText(note,'Validate against the official solicitation and current registrations.')}</div></div>`}
function pageStart(number,title,deck,total,id,date,extraClass=''){return`<section class="report-page ${extraClass}">${pageHeader(number,total,id,date)}<div class="page-number">${String(number).padStart(2,'0')}</div><h1 class="page-title">${esc(title)}</h1><p class="page-deck">${esc(deck)}</p><div class="gold-rule"></div>`}

function buildModel(row){
  const s1=row.stage1||{};
  const s2=row.stage2||{};
  const match=s1.match||{};
  const src=opp||{};
  const recommendation=row.recommendation||s1.recommendation||'PENDING';
  const score=Math.max(0,Math.min(100,Number(row.fit_score??s1.fit_score??0)||0));
  const title=field(src.title,s1._title,noticeId,'Untitled Opportunity');
  const agency=field(src.agency,s1._agency,'Not specified');
  const naics=field(src.naics,src.naics_code,s1._naics,'Not specified');
  const setAside=field(src.set_aside,s1._set_aside,'Unrestricted / Not specified');
  const deadline=field(src.response_deadline,src.deadline,s1._deadline,'');
  const solicitation=field(src.solicitation_number,src.solicitationNumber,src.notice_id,noticeId,'Not specified');
  const client=field(profile.legal_name,profile.business_name,profile.name,session?.business_name,'Client Organization');
  const raw=src.raw||{};
  const psc=field(src.psc,src.product_service_code,raw.classificationCode,raw.productServiceCode,'Not provided');
  const contractType=field(src.contract_type,src.type,raw.type,raw.contractType,'Verify in solicitation');
  const estimatedValue=field(src.estimated_value,src.award_amount,raw.estimatedValue,raw.awardAmount,'Not publicly stated');
  const performancePeriod=field(src.contract_length,src.period_of_performance,raw.periodOfPerformance,'Not provided');
  const date=new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  const dleft=daysRemaining(deadline);
  const required=listItems(s2.required_work,'Review the complete performance work statement and all attachments.',8);
  const staffing=listItems(s2.staffing_delivery,'Confirm named technical staff, management coverage, delivery capacity, and required credentials.',8);
  const documents=listItems(s2.documents_needed,'Build a complete solicitation compliance and document matrix.',8);
  const pricing=listItems(s2.pricing_considerations,'Validate contract type, cost drivers, labor rates, indirect rates, and price-to-win assumptions.',6);
  const questions=listItems(s2.questions_for_co,'Clarify material solicitation unknowns before final bid authorization.',7);
  const checklist=arr(s2.proposal_checklist).map(x=>({item:itemText(x),owner:x?.owner_hint||'Assigned Owner',deadline:x?.deadline_hint||'To be set'})).filter(x=>x.item).slice(0,8);
  const conditions=listItems(s1.conditions,'Complete all mandatory validation gates before committing full bid resources.',6);
  const capabilityLevel=String(match.capability_alignment||level(score)).toUpperCase();
  const confidence=s2&&Object.keys(s2).length>=5?'High':s1&&Object.keys(s1).length>=4?'Moderate':'Preliminary';
  const eligibility=match.set_aside_eligible===false?'Not Confirmed':match.set_aside_eligible===true?'Appears Qualified':'Validation Required';
  const naicsStatus=match.naics_match===true?'Strong Match':match.naics_match===false?'Mismatch':'Validation Required';
  const competition=/unrestricted|none/i.test(setAside)?'Open Competition':'Restricted Field';
  const risk=recommendation==='NO_BID'?'High':recommendation==='CONDITIONAL'?'Moderate':'Low–Moderate';
  const complexity=documents.length>=7||staffing.length>=7?'High':documents.length>=4||staffing.length>=4?'Moderate–High':'Moderate';
  const readiness=capabilityLevel==='HIGH'?'Evidence Required':capabilityLevel==='MEDIUM'?'Validation Needed':'Material Gaps';
  const summary=s1.opportunity_summary||'This assessment evaluates the opportunity against the contractor’s registered capability profile, eligibility indicators, delivery readiness, and available solicitation information.';
  const rationale=s1.rationale||'The recommendation reflects capability alignment, eligibility, timing, compliance burden, evidence quality, and execution risk.';
  const capabilityRows=required.slice(0,6).map((req,index)=>{
    const evidence=index===0?field(match.capability_detail,profile.capabilities,'Reported business capabilities'):index===1?field(profile.past_performance,'Comparable evidence not supplied'):staffing[index-2]||field(profile.capabilities,'Capability evidence requires validation');
    const rating=capabilityLevel==='HIGH'?(index<3?'STRONG':'PARTIAL-STRONG'):capabilityLevel==='MEDIUM'?(index<2?'PARTIAL-STRONG':'PARTIAL'):(index===0?'PARTIAL':'GAP');
    const gap=staffing[index]||documents[index]||'Requirement-specific evidence has not been verified.';
    const recommendationText=index===0?'Map named proof to this requirement.':index===1?'Build a comparable-project evidence matrix.':index===2?'Confirm staffing, credentials, and availability.':index===3?'Validate tools, processes, and quality controls.':index===4?'Confirm local delivery and surge capacity.':'Assign an owner and closure date.';
    return{req,evidence,rating,gap,recommendation:recommendationText};
  });
  while(capabilityRows.length<5){
    capabilityRows.push({req:'Solicitation-specific requirement '+(capabilityRows.length+1),evidence:'Not enough source detail provided',rating:'GAP',gap:'Complete solicitation review required',recommendation:'Obtain and analyze the official requirement.'});
  }
  const strengths=unique([
    match.naics_match===true?'Direct NAICS alignment':'',
    match.set_aside_eligible===true?'Reported set-aside alignment':'',
    capabilityLevel==='HIGH'?'Strong capability-category alignment':'',
    field(profile.capabilities,'')?clip(profile.capabilities,140):'',
    required[0]?'Relevant scope categories identified':''
  ]).slice(0,4);
  const weaknesses=unique([
    capabilityLevel!=='HIGH'?'Requirement-level evidence is incomplete':'',
    !field(profile.past_performance,'')||/not specified/i.test(field(profile.past_performance,''))?'Comparable past performance is not substantiated':'',
    staffing[0]?'Named staffing and credential coverage require validation':'',
    'Official solicitation terms and amendments must be fully reviewed'
  ]).slice(0,4);
  const advantages=unique([
    capabilityLevel==='HIGH'?'Opportunity aligns with reported core capabilities':'',
    match.naics_match===true?'Industry classification supports initial fit':'',
    'A disciplined evidence-led response can improve competitive credibility',
    match.set_aside_eligible===true?'Set-aside may narrow the competitive field':''
  ]).slice(0,4);
  const competitiveRisks=unique([
    competition==='Open Competition'?'Broad competitive field':'Established incumbents and specialized competitors',
    readiness!=='Evidence Required'?'Unverified staffing, credentials, or delivery depth':'Evidence must equal or exceed incumbent credibility',
    dleft!==null&&dleft<=21?'Compressed pursuit schedule':'',
    pricing[0]?'Pricing position has not been validated':''
  ]).slice(0,4);
  const scheduleRisk=dleft!==null&&dleft<=10?'High':dleft!==null&&dleft<=25?'Medium':'Low';
  const complianceRisk=documents.length>=6?'High':documents.length>=3?'Medium':'Low';
  const staffingRisk=capabilityLevel==='LOW'?'High':staffing.length>=5?'Medium':'Medium';
  const pastRisk=/not specified/i.test(field(profile.past_performance,''))||!field(profile.past_performance,'')?'High':capabilityLevel==='HIGH'?'Medium':'High';
  const riskRows=[
    ['Compliance',complianceRisk,'Complete the official solicitation compliance review and document matrix.'],
    ['Past Performance',pastRisk,'Substantiate comparable scope, complexity, value, outcomes, and customer references.'],
    ['Schedule',scheduleRisk,dleft!==null?`${dleft} days remain. Establish time-boxed validation and decision gates.`:'Verify the response deadline and amendment schedule.'],
    ['Staffing',staffingRisk,'Confirm named personnel, credentials, availability, and surge coverage.'],
    ['Pricing','Medium',pricing[0]||'Validate cost drivers, rates, escalation, and local market position.'],
    ['Financial','Information','Review working capital, cash flow, and task-order funding exposure.'],
    ['Operational','Medium','Validate delivery governance, quality controls, local presence, and escalation procedures.'],
    ['Partner Risk',capabilityLevel==='LOW'?'High':'Medium','Perform partner due diligence and establish controlled teaming terms.']
  ];
  const immediate=unique([documents[0],`Confirm deadline, submission method, evaluation model, and minimum qualifications`,match.set_aside_eligible!==false?'Verify SAM, UEI, NAICS, size status, and representations':'Resolve the set-aside eligibility issue']).slice(0,3);
  const hours72=unique([checklist[0]?.item,'Complete the evidence matrix for past performance and capability proof',staffing[0],'Identify teaming or local-delivery gaps and screen qualified partners']).slice(0,3);
  const week=unique([checklist[1]?.item,'Conduct a formal management bid / no-bid review','Authorize or decline resource commitment','Record the decision, conditions, owners, and closure dates']).slice(0,3);
  return{s1,s2,match,src,recommendation,score,title,agency,naics,setAside,deadline,solicitation,client,psc,contractType,estimatedValue,performancePeriod,date,dleft,required,staffing,documents,pricing,questions,checklist,conditions,capabilityLevel,confidence,eligibility,naicsStatus,competition,risk,complexity,readiness,summary,rationale,capabilityRows,strengths,weaknesses,advantages,competitiveRisks,riskRows,immediate,hours72,week,location:placeOfPerformance(src),id:assessmentId(row)};
}

function render(row){
  clearTimeout(polling);
  progress.classList.add('done');
  loading.style.display='none';
  document.getElementById('printBtn').style.display='inline-flex';
  const m=buildModel(row);
  const total=11;
  const label=recText(m.recommendation);
  const fitLabel=level(m.score);
  let html='<div class="report">';

  html+=`<section class="report-page cover"><img class="cover-logo" src="${BRAND_LOGO}" alt="APROPOS GROUP LLC"><div class="cover-kicker">Government Opportunity Intelligence</div><h1 class="cover-title">Executive Opportunity Assessment</h1><div class="cover-subtitle">Prepared for</div><div class="cover-rule"></div><div class="cover-client">${esc(m.client)}</div><div class="cover-opportunity">${esc(m.title)}</div><div class="cover-agency">${esc(m.agency)} · Notice ${esc(m.solicitation)}</div><div class="cover-decision"><div class="score-orb"><div><strong>${m.score||'—'}</strong><span>Fit Score</span></div></div><div class="decision-box"><div class="label">Executive Recommendation</div><div class="value">${esc(label)}</div><div class="cover-note">Assessment confidence: ${esc(m.confidence)} · Prepared ${esc(m.date)}</div></div></div>${pageFooter()}</section>`;

  html+=pageStart(2,'Executive Decision Summary','The recommendation, supporting evidence, and decision-critical facts in one view.',total,m.id,m.date,'summary-page');
  html+=`<div class="executive-summary"><div class="eyebrow">Executive Summary</div><div class="body-copy"><p>${safeText(m.summary)}</p><p>${safeText(m.rationale)}</p></div></div>`;
  html+=`<div class="metric-grid">${metricCard('Overall Fit',m.score+' / 100',fitLabel,'gold')}${metricCard('Eligibility',m.eligibility,'Verify live status',m.eligibility==='Appears Qualified'?'green':'amber')}${metricCard('Competition',m.competition,'Market position',m.competition==='Open Competition'?'red':'amber')}${metricCard('Execution Risk',m.risk,'Management review',m.risk==='High'?'red':'amber')}${metricCard('Proposal Difficulty',m.complexity,'Document burden','amber')}${metricCard('Resource Readiness',m.readiness,'Evidence gate','gold')}${metricCard('Strategic Alignment',m.capabilityLevel,'Capability fit',m.capabilityLevel==='HIGH'?'green':'amber')}${metricCard('Assessment Confidence',m.confidence,'Source quality','') }</div>`;
  html+=`<table class="report-table"><thead><tr><th colspan="4">Opportunity Overview</th></tr></thead><tbody><tr><td class="field">Agency</td><td>${esc(m.agency)}</td><td class="field">Solicitation / Notice</td><td>${esc(m.solicitation)}</td></tr><tr><td class="field">NAICS</td><td>${esc(m.naics)}</td><td class="field">PSC</td><td>${esc(m.psc)}</td></tr><tr><td class="field">Set-Aside</td><td>${esc(m.setAside)}</td><td class="field">Estimated Value</td><td>${esc(m.estimatedValue)}</td></tr><tr><td class="field">Response Date</td><td>${esc(fmtDate(m.deadline))}${m.dleft!==null?' · '+m.dleft+' days remaining':''}</td><td class="field">Performance Period</td><td>${esc(m.performancePeriod)}</td></tr><tr><td class="field">Contract Type</td><td>${esc(m.contractType)}</td><td class="field">Location</td><td>${esc(m.location)}</td></tr></tbody></table>`;
  html+=`<div class="callout"><strong>Executive Decision</strong><span>${m.recommendation==='NO_BID'?'Do not authorize pursuit unless the material disqualifying conditions are resolved.':'Advance to controlled validation. Do not authorize full bid-resource commitment until mandatory qualifications, evidence, staffing, and execution capacity are confirmed.'}</span></div>${pageFooter()}</section>`;

  html+=pageStart(3,'Strategic Alignment','Business capability categories compared directly with the opportunity’s reported requirements.',total,m.id,m.date);
  html+=`<div class="two-col"><div class="panel"><div class="panel-title">Business Capabilities</div>${listHtml(unique([field(profile.capabilities,''),m.match.capability_detail,m.naicsStatus,m.eligibility,'Project management and quality assurance capability require evidence']),'Business capability details were not available.',6)}</div><div class="panel"><div class="panel-title">Solicitation Requirements</div>${listHtml(m.required,'Obtain and review the complete performance work statement.',6)}</div></div>`;
  html+=`<div class="metric-grid">${metricCard('Alignment Indicator',m.capabilityLevel,'Reported category fit',m.capabilityLevel==='HIGH'?'green':'amber')}${metricCard('NAICS Alignment',m.naicsStatus,m.naics,m.naicsStatus==='Strong Match'?'green':'amber')}${metricCard('Set-Aside',m.eligibility,m.setAside,m.eligibility==='Appears Qualified'?'green':'amber')}${metricCard('Evidence Position',m.readiness,'Proof required','gold')}</div>`;
  html+=`<div class="executive-summary"><div class="eyebrow">Executive Observation</div><div class="body-copy"><p>${safeText(m.match.capability_detail,'The available categories indicate potential alignment. The decision turns on documented proof, requirement-level evidence, and verified delivery capacity—not broad capability language.')}</p></div></div>`;
  html+=`<div class="callout"><strong>Strategic Recommendation</strong><span>Advance only through controlled capture validation. Require documented evidence of eligibility, relevant experience, staffing depth, credential coverage, and delivery capacity before final bid authorization.</span></div>${pageFooter()}</section>`;

  html+=pageStart(4,'Eligibility Review','Decision gates that must be confirmed against the official solicitation and live registrations.',total,m.id,m.date);
  html+=`<div class="status-grid">${statusCard('Business Status',m.client!=='Client Organization'?'Profile Available':'Not Verified','A contractor capability profile is available for this assessment.','Confirm the legal entity, operating status, and authorized bidder identity.')}${statusCard('NAICS Match',m.naicsStatus,m.match.naics_detail||`The reported opportunity NAICS is ${m.naics}.`,'Verify the code is active in SAM and applicable to the offered scope.')}${statusCard('Set-Aside Qualification',m.eligibility,m.match.set_aside_detail||`The opportunity is reported as ${m.setAside}.`,'Confirm current size status and representations as of submission.')}${statusCard('Required Certifications',m.documents.some(x=>/certif/i.test(x))?'Conditional':'Not Specified','No complete mandatory certification set is available in the source record.','Review the solicitation, attachments, clauses, and amendments.')}${statusCard('Licensing / Credentials',m.staffing.some(x=>/licen|credential|professional engineer|clearance/i.test(x))?'Conditional':'Unknown',m.staffing.find(x=>/licen|credential|professional engineer|clearance/i.test(x))||'Requirement-specific professional licensing and credentials have not been verified.','Treat material credentials as bid gates until confirmed.')}${statusCard('Insurance / Bonding','Unknown','Coverage and bonding thresholds are not confirmed in the available source data.','Confirm every required policy, limit, endorsement, and bond condition.')}${statusCard('SAM / UEI',field(profile.uei,profile.cage)?'Reported Identifier':'Not Provided',field(profile.uei,profile.cage)?`Profile identifiers include ${field(profile.uei,profile.cage)}.`:'No verified live SAM / UEI status is displayed in this assessment.','Verify live registration, expiration, exclusions, and entity alignment.')}${statusCard('Small-Business Status',m.match.set_aside_eligible===true?'Appears Eligible':'Validation Required',m.match.set_aside_detail||'Current small-business status must be validated against the applicable size standard.','Validate status and representations on the submission date.')}</div>`;
  html+=`<div class="callout" style="margin-top:13px"><strong>Mandatory Gate</strong><span>No final bid authorization until all solicitation-specific eligibility, registration, credential, insurance, bonding, and size-status requirements are verified.</span></div>${pageFooter()}</section>`;

  html+=pageStart(5,'Capability Evidence Ledger','Each major requirement evaluated independently against the evidence available to the assessment.',total,m.id,m.date);
  html+=`<table class="report-table capability-table"><thead><tr><th>Solicitation Requirement</th><th>Business Evidence</th><th>Assessment</th><th>Primary Gap</th><th>Required Action</th></tr></thead><tbody>${m.capabilityRows.map(row=>`<tr><td>${esc(clip(row.req,135))}</td><td>${esc(clip(row.evidence,145))}</td><td class="rating ${/GAP/.test(row.rating)?'gap':/PARTIAL/.test(row.rating)?'partial':'strong'}">${esc(row.rating)}</td><td>${esc(clip(row.gap,145))}</td><td>${esc(row.recommendation)}</td></tr>`).join('')}</tbody></table>`;
  html+=`<div class="callout"><strong>Capability Conclusion</strong><span>The business may possess relevant capability categories; however, the evidence package must establish compliant, competitive execution at the requirement level.</span></div>${pageFooter()}</section>`;

  html+=pageStart(6,'Competitive Position','The opportunity is viable only if general alignment is converted into credible, differentiated proof.',total,m.id,m.date);
  html+=`<div class="quadrant"><div class="quad-card"><h3>Business Strengths</h3><div class="quad-tag">Asset</div>${listHtml(m.strengths,'Initial capability alignment requires further substantiation.',4)}</div><div class="quad-card"><h3>Business Weaknesses</h3><div class="quad-tag">Gap</div>${listHtml(m.weaknesses,'No material weaknesses were documented in the available source.',4)}</div><div class="quad-card"><h3>Competitive Advantages</h3><div class="quad-tag">Leverage</div>${listHtml(m.advantages,'Develop evidence-based differentiators tied to evaluation factors.',4)}</div><div class="quad-card"><h3>Competitive Risks</h3><div class="quad-tag">Risk</div>${listHtml(m.competitiveRisks,'Validate the incumbent landscape and likely competitor strengths.',4)}</div></div>`;
  html+=`<div class="two-col"><div class="panel"><div class="panel-title">Recommended Positioning</div>${listHtml(['Compete on verified outcomes, responsiveness, risk control, and integration.','Lead with requirement-level evidence—not generic capability claims.','Use controlled teaming to close material experience, credential, staffing, or local-delivery gaps.'],null,4)}</div><div class="panel"><div class="panel-title">Competitive Outlook</div><div class="body-copy"><p><strong>${m.recommendation==='NO_BID'?'Not viable under current conditions':m.score>=75?'Viable if evidence is strong':'Viable only after material gaps are closed'}</strong></p><p>${safeText(m.rationale)}</p></div></div></div>${pageFooter()}</section>`;

  html+=pageStart(7,'Risk Command Center','Probability, impact, and mitigation priorities supporting the executive bid decision.',total,m.id,m.date);
  html+=`<div class="two-col"><div class="panel"><div class="panel-title">Top Executive Risks</div>${listHtml([m.riskRows[1][2],m.riskRows[3][2],m.riskRows[0][2],m.riskRows[2][2]],'Complete a formal risk review.',4)}</div><div class="panel"><div class="panel-title">Risk-Control Priority</div><div class="body-copy"><p>Resolve eligibility, evidence, staffing, schedule, pricing, and delivery unknowns before full resource commitment.</p><p>Every accepted risk should have an accountable owner, mitigation action, closure date, and executive acceptance.</p></div></div></div>`;
  html+=`<table class="report-table risk-register"><thead><tr><th>Category</th><th>Risk Level</th><th>Probability</th><th>Impact</th><th>Mitigation</th></tr></thead><tbody>${m.riskRows.map(([category,rating,mitigation])=>`<tr><td>${esc(category)}</td><td class="${riskClass(rating)}">${esc(rating)}</td><td>${rating==='High'?'High':rating==='Low'?'Low':'Medium'}</td><td>${/Financial|Partner/.test(category)?'Medium':'High'}</td><td>${esc(clip(mitigation,180))}</td></tr>`).join('')}</tbody></table>${pageFooter()}</section>`;

  html+=pageStart(8,'Executive Observations','The most consequential opportunity, concern, unknowns, assumptions, and validation requirements.',total,m.id,m.date,'observations-page');
  const unknowns=unique([...m.questions.slice(0,4),'Contract value and award structure','Exact evaluation factors and scoring weights','Incumbent and competitive landscape']).slice(0,6);
  html+=`<div class="observation-grid"><div class="observation"><h3>Most Significant Opportunity</h3><p>${safeText(m.summary)}</p></div><div class="observation"><h3>Largest Concern</h3><p>${safeText(m.weaknesses[0]||m.rationale)}</p></div><div class="observation"><h3>Material Unknowns</h3>${listHtml(unknowns,'Review the full solicitation and amendments.',5)}</div><div class="observation"><h3>Required Validation</h3>${listHtml(unique([...m.conditions,...m.documents.slice(0,3),...m.staffing.slice(0,2)]),'Complete the official solicitation, eligibility, evidence, and capacity review.',5)}</div><div class="observation"><h3>Critical Assumptions</h3><p>The source accurately reflects the opportunity; the response date and set-aside remain current; and the contractor profile accurately represents present capabilities and status.</p></div><div class="observation"><h3>Questions Requiring Clarification</h3>${listHtml(m.questions,'Clarify all material scope, eligibility, evaluation, and performance questions.',5)}</div></div>`;
  html+=`<div class="callout" style="margin-top:13px"><strong>Assessment Confidence</strong><span>${esc(m.confidence)}. Confidence is limited by the completeness, currency, and accuracy of available source data and contractor evidence.</span></div>${pageFooter()}</section>`;

  html+=pageStart(9,'Bid / No-Bid Decision','Executive decision support only—no proposal-development content.',total,m.id,m.date);
  html+=`<div class="decision-banner"><div><div class="label">Final Recommendation</div><div class="value">${esc(label)}</div></div><div class="score">${m.score} / 100</div></div>`;
  html+=`<div class="executive-summary"><div class="eyebrow">Executive Rationale</div><div class="body-copy"><p>${safeText(m.rationale)}</p></div></div>`;
  const goFactors=unique([m.naicsStatus==='Strong Match'?'Direct NAICS alignment':'',m.eligibility==='Appears Qualified'?'Reported set-aside alignment':'',m.capabilityLevel==='HIGH'?'Relevant capability categories':'',m.strengths[0],m.strengths[1]]).slice(0,4);
  const stopFactors=unique([m.match.set_aside_eligible===false?'Set-aside eligibility cannot be established':'','Mandatory credential or licensing gate cannot be satisfied','No qualifying evidence or credible partner','Security, capacity, or delivery minimums cannot be met']).slice(0,4);
  const conditionalFactors=unique(['Official solicitation verification','Named staffing and capacity','Past-performance substantiation','Competitive strategy and controlled teaming route',...m.conditions]).slice(0,4);
  html+=`<div class="factor-grid"><div class="factor go"><h3>Go Factors</h3>${listHtml(goFactors,'No decisive go factors are confirmed.',4)}</div><div class="factor stop"><h3>Stop Factors</h3>${listHtml(stopFactors,'Stop if any mandatory minimum cannot be satisfied.',4)}</div><div class="factor conditional"><h3>Conditional Factors</h3>${listHtml(conditionalFactors,'Close every mandatory validation condition.',4)}</div></div>`;
  html+=`<div class="review-grid"><div class="review-item">Pursuit budget</div><div class="review-item">Opportunity owner</div><div class="review-item">Risk acceptance</div><div class="review-item">Teaming authority</div><div class="review-item">Eligibility sign-off</div><div class="review-item">Capacity commitment</div></div><div class="flow"><div class="flow-step">Validate Eligibility</div><div class="flow-step">Substantiate Evidence</div><div class="flow-step">Confirm Capacity</div><div class="flow-step">Executive Authorization</div></div>${pageFooter()}</section>`;

  html+=pageStart(10,'Executive Action Plan','A controlled validation sequence leading to a documented management decision.',total,m.id,m.date);
  html+=`<div class="action-columns"><div class="action-column"><h3>Within 24 Hours</h3>${listHtml(m.immediate,'Obtain and review the complete solicitation.',3)}</div><div class="action-column"><h3>Within 72 Hours</h3>${listHtml(m.hours72,'Complete the evidence and resource-readiness review.',3)}</div><div class="action-column"><h3>Within One Week</h3>${listHtml(m.week,'Conduct the formal management decision review.',3)}</div></div>`;
  const responsibility=[['Executive Sponsor','Final decision and risk acceptance','Bid / no-bid authorization'],['Capture / BD Lead','Source validation and competitive landscape','Validated opportunity record'],['Technical Lead','Capabilities, staffing, credentials, and evidence','Technical readiness finding'],['Contracts / Compliance','Eligibility, terms, registrations, and clauses','Compliance gate decision'],['Finance / Operations','Cost, cash flow, capacity, and delivery model','Resource-readiness finding']];
  html+=`<table class="report-table"><thead><tr><th>Executive Assignment</th><th>Primary Responsibility</th><th>Decision Output</th></tr></thead><tbody>${responsibility.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('')}</tbody></table>`;
  html+=`<div class="checklist-grid">${['Official solicitation reviewed','Eligibility confirmed','Past performance substantiated','Credential / discipline coverage confirmed','Security requirements addressed','Delivery model validated','Financial and staffing capacity confirmed','Management risk acceptance recorded'].map(x=>`<div class="check-item">${x}</div>`).join('')}</div>`;
  html+=`<div class="callout"><strong>Final Recommendation</strong><span>${m.recommendation==='NO_BID'?'Do not pursue unless the disqualifying conditions are conclusively resolved.':'Proceed only if all mandatory eligibility gates are confirmed and a defensible route exists for evidence, staffing, credentials, pricing, and execution. Otherwise, do not bid.'}</span></div>${pageFooter()}</section>`;

  html+=pageStart(11,'Management Authorization & Source Notes','Formal decision recording, limitations, and source-of-truth controls.',total,m.id,m.date);
  html+=`<div class="approval-box"><div class="approval-title">Management Decision</div><div class="approval-options"><span>☐ APPROVE PURSUIT</span><span>☐ APPROVE WITH CONDITIONS</span><span>☐ DO NOT PURSUE</span></div><div class="signature-grid"><div class="signature">Authorized Executive / Signature</div><div class="signature">Date</div><div class="signature">Decision Record ID</div></div></div>`;
  html+=`<div class="two-col" style="margin-top:16px"><div class="panel"><div class="panel-title">Assessment Basis</div><ul class="source-list"><li>Contractor capability profile available to the Analyze Fit Engine.</li><li>Opportunity metadata and official procurement notice information available at analysis time.</li><li>Stage 1 fit analysis and Stage 2 validation package generated by the Analyze Fit Engine.</li><li>Deterministic executive presentation rules contained in this report template.</li></ul></div><div class="panel"><div class="panel-title">Limitations</div><div class="limitations">This assessment supports executive decision-making and is not legal, accounting, financial, engineering, compliance, or proposal-development advice. Official solicitation documents, amendments, live registrations, and qualified professional review control. Missing or stale source information may materially change the recommendation.</div></div></div>`;
  html+=`<table class="report-table" style="margin-top:16px"><thead><tr><th>Record Field</th><th>Value</th></tr></thead><tbody><tr><td>Assessment ID</td><td>${esc(m.id)}</td></tr><tr><td>Prepared For</td><td>${esc(m.client)}</td></tr><tr><td>Opportunity</td><td>${esc(m.title)}</td></tr><tr><td>Notice / Solicitation</td><td>${esc(m.solicitation)}</td></tr><tr><td>Prepared Date</td><td>${esc(m.date)}</td></tr><tr><td>Recommendation</td><td>${esc(label)} · ${m.score} / 100</td></tr></tbody></table>`;
  html+=`${pageFooter()}</section></div><div class="report-actions"><button class="button button-print" onclick="window.print()">Export Premium PDF ↓</button></div><div class="trust">Prepared by APROPOS GROUP LLC · Government Opportunity Intelligence</div>`;
  report.innerHTML=html;
  document.getElementById('topTitle').textContent=m.title.slice(0,100);
}

function renderDetails(){
  clearTimeout(polling);
  loading.style.display='none';
  const src=opp||{};
  const raw=src.raw||{};
  const title=field(src.title,'Untitled Opportunity');
  const agency=field(src.agency,raw.fullParentPathName,'Not specified');
  const naics=field(src.naics,src.naics_code,raw.naicsCode,'Not specified');
  const setAside=field(src.set_aside,raw.typeOfSetAsideDescription,'Unrestricted / Not specified');
  const deadline=field(src.response_deadline,src.deadline,raw.responseDeadLine,'');
  const solicitation=field(src.solicitation_number,raw.solicitationNumber,noticeId,'Not specified');
  const noticeType=field(raw.type,raw.baseType,'Not specified');
  const posted=field(raw.postedDate,'');
  const pop=placeOfPerformance(src);
  const contacts=arr(raw.pointOfContact);
  const resources=arr(raw.resourceLinks);
  const contactsHtml=contacts.length?contacts.map(c=>'<div>'+esc(field(c.fullName,'Contact'))+(c.title?' — '+esc(c.title):'')+(c.email?' — <a href="mailto:'+esc(c.email)+'" style="color:var(--blue)">'+esc(c.email)+'</a>':'')+(c.phone?' — '+esc(c.phone):'')+'</div>').join(''):'Not listed';
  const resourcesHtml=resources.length?'<ul>'+resources.map((r,i)=>'<li><a href="'+esc(r)+'" target="_blank" rel="noopener" style="color:var(--blue)">Document '+(i+1)+' — Download →</a></li>').join('')+'</ul>':'<p>No attachments listed for this notice.</p>';
  report.innerHTML=
    '<div class="panel" style="margin-bottom:16px">'
    +'<div class="eyebrow">Solicitation '+esc(solicitation)+'</div>'
    +'<h1 style="font:700 1.7rem/1.25 &quot;Cormorant Garamond&quot;,Georgia,serif;color:#fff;margin:4px 0 8px">'+esc(title)+'</h1>'
    +'<div style="color:#9fb0c5;font-size:.85rem">'+esc(agency)+'</div>'
    +'</div>'
    +'<div class="panel" style="margin-bottom:16px;background:#fff">'
    +'<table class="report-table">'
    +'<tr><td class="field">NAICS</td><td>'+esc(naics)+'</td></tr>'
    +'<tr><td class="field">Notice Type</td><td>'+esc(noticeType)+'</td></tr>'
    +'<tr><td class="field">Set-Aside</td><td>'+esc(setAside)+'</td></tr>'
    +'<tr><td class="field">Response Deadline</td><td>'+(deadline?esc(fmtDate(deadline)):'Not specified')+'</td></tr>'
    +'<tr><td class="field">Posted</td><td>'+(posted?esc(fmtDate(posted)):'Not specified')+'</td></tr>'
    +'<tr><td class="field">Place of Performance</td><td>'+esc(pop)+'</td></tr>'
    +'<tr><td class="field">Point of Contact</td><td>'+contactsHtml+'</td></tr>'
    +'</table>'
    +'</div>'
    +'<div class="panel" style="margin-bottom:16px;background:#fff">'
    +'<div class="panel-title">Description</div>'
    +'<div id="descBody" class="body-copy"><p>Loading solicitation description…</p></div>'
    +'</div>'
    +'<div class="panel" style="margin-bottom:16px;background:#fff">'
    +'<div class="panel-title">Attachments &amp; Documents</div>'
    +resourcesHtml
    +'</div>'
    +'<div class="report-actions">'
    +'<button class="button" style="background:#77e4b2;color:#06172c" onclick="startAnalysis()">Run Analyze Fit →</button>'
    +'</div>'
    +'<div class="trust" style="margin-top:10px">Sourced from official public records.</div>';
  document.getElementById('topTitle').textContent=title.slice(0,100);
  loadDescription();
}

function startAnalysis(){
  report.innerHTML='';
  document.getElementById('loadingTitle').textContent='Preparing the executive opportunity dossier…';
  loading.style.display='';
  analyze(false);
}

async function loadDescription(){
  const el=document.getElementById('descBody');
  if(!el)return;
  if(!noticeId){el.innerHTML='<p>No description available — see attachments.</p>';return}
  try{
    const response=await fetch('/.netlify/functions/opportunity-description?noticeId='+encodeURIComponent(noticeId));
    const data=await response.json();
    if(data.description){
      el.innerHTML=data.description.split(/\n{2,}/).map(p=>'<p>'+esc(p).replace(/\n/g,'<br>')+'</p>').join('');
    }else{
      el.innerHTML='<p>No description text was provided for this notice — see attachments above for full requirements.</p>';
    }
  }catch{
    el.innerHTML='<p>Description could not be loaded — see attachments above for full requirements.</p>';
  }
}

(async()=>{await loadContext();renderDetails()})();
</script>

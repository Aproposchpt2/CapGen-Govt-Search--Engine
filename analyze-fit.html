<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Analyze Fit — NGCC</title><style>:root{--bg:#0a1a3a;--panel:#0f2244;--line:rgba(91,175,255,.2);--text:#f0f6ff;--muted:#9ab4d2;--gold:#d9a45b;--cyan:#5bd3ff;--green:#2ecc8a;font-family:Arial,sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);line-height:1.6}.top{padding:14px 22px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;align-items:center}.btn{display:inline-block;padding:9px 14px;border-radius:8px;background:var(--cyan);color:#07162e;text-decoration:none;font-weight:700;border:0;cursor:pointer}.page{max-width:920px;margin:auto;padding:28px 16px}.loading{text-align:center;padding:60px;color:var(--muted)}.card{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:22px;margin-bottom:14px}.hero{display:grid;grid-template-columns:130px 1fr;gap:20px}.score{width:115px;height:115px;border:7px solid var(--cyan);border-radius:50%;display:grid;place-items:center;text-align:center;font-size:2rem;font-weight:700}.score small{display:block;font-size:.65rem;color:var(--muted)}h1,h2{margin:0 0 8px}p,li{color:var(--muted)}.rec{color:var(--green);font-weight:700}.proposal{border-color:rgba(217,164,91,.4);background:linear-gradient(135deg,rgba(217,164,91,.12),rgba(91,211,255,.07))}.error{color:#ffaaaa}@media(max-width:600px){.hero{grid-template-columns:1fr}.top{padding:11px}.page{padding:18px 10px}}</style></head><body><header class="top"><div><strong>NGCC Analyze Fit</strong><div style="font-size:.72rem;color:var(--muted)">Free opportunity evaluation</div></div><a id="back" class="btn" href="/demo">Back to Dashboard</a></header><main class="page"><div id="loading" class="loading">Analyzing opportunity fit…</div><div id="report"></div></main><script>const p=new URLSearchParams(location.search),id=p.get('id')||'',token=p.get('t')||localStorage.getItem('demo_view_token')||'',opp=JSON.parse(sessionStorage.getItem('analyze_opp')||'null');document.getElementById('back').href='/demo?t='+encodeURIComponent(token);const e=s=>String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');function items(a){return Array.isArray(a)&&a.length?'<ul>'+a.map(x=>'<li>'+e(typeof x==='string'?x:'Review item')+'</li>').join('')+'</ul>':'<p>No additional items were returned.</p>'}function show(r){const s=r.stage1||{},m=s.match||{},title=opp&&opp.title?opp.title:(s._title||id);document.getElementById('loading').style.display='none';document.getElementById('report').innerHTML='<section class="card hero"><div class="score">'+e(r.fit_score||'—')+'<small>FIT SCORE</small></div><div><h1>'+e(title)+'</h1><div class="rec">'+e((r.recommendation||'PENDING').replaceAll('_',' '))+'</div><p>'+e(s.rationale||m.rationale||'This result compares the opportunity with your captured business profile.')+'</p></div></section><section class="card"><h2>Capability Alignment</h2>'+items(m.strengths||s.strengths)+'</section><section class="card"><h2>Requirements and Risk Considerations</h2>'+items(m.gaps||s.gaps||s.risks)+'</section><section class="card proposal"><h2>Ready to Pursue This Opportunity?</h2><p>NGCC provides free contract discovery, opportunity matching, and Analyze Fit. When you decide to compete, Apropos Group LLC can help prepare a professional, responsive Contract Proposal.</p><a class="btn" href="/#analyze">Explore Contract Proposal Development</a></section>'}async function poll(row){const r=await fetch('/.netlify/functions/get-analysis?id='+encodeURIComponent(row)+'&view_token='+encodeURIComponent(token)),d=await r.json();if(!r.ok)throw Error(d.error||'Analysis unavailable');if(d.status==='pending'||d.status==='stage1_pending')return setTimeout(()=>poll(row),3500);show(d)}async function run(){if(!id||!token){document.getElementById('loading').innerHTML='<span class="error">A valid opportunity and dashboard token are required.</span>';return}try{const r=await fetch('/.netlify/functions/analyze-fit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({opportunityId:id,view_token:token,opportunity:opp})}),d=await r.json();if(!r.ok)throw Error(d.message||d.error||'Analyze Fit unavailable');d.status==='pending'?poll(d.id):show(d)}catch(x){document.getElementById('loading').innerHTML='<span class="error">'+e(x.message)+'</span>'}}run()</script></body></html>

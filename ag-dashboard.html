<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opening CapGen Pipeline — Apropos Group LLC</title>
<meta http-equiv="refresh" content="0;url=/pipeline">
<style>
:root{--sap:#0F2A6A;--white:#fff;--muted:rgba(255,255,255,.7);--gold:#C9A84C;font-family:Arial,Helvetica,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:var(--sap);color:var(--white);display:grid;place-items:center;padding:24px;text-align:center}
.card{max-width:520px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:20px;padding:34px}
h1{font-size:1.35rem;margin-bottom:10px}.sub{color:var(--muted);line-height:1.6}.btn{display:inline-block;margin-top:18px;background:var(--gold);color:var(--sap);padding:12px 22px;border-radius:999px;text-decoration:none;font-weight:800}
</style>
</head>
<body>
<div class="card">
  <h1>Opening your upgraded CapGen Pipeline…</h1>
  <p class="sub">The legacy Apropos dashboard has been retired. You are being routed to the upgraded opportunity pipeline.</p>
  <a class="btn" href="/pipeline">Open Pipeline</a>
</div>
<script>
try{location.replace('/pipeline');}catch(e){location.href='/pipeline';}
</script>
</body>
</html>

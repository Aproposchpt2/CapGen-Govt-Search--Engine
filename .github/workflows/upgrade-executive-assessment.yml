name: Upgrade NGCC Executive Opportunity Assessment

on:
  push:
    paths:
      - '.github/workflows/upgrade-executive-assessment.yml'

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply executive assessment and hero refinement
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          # ------------------------------------------------------------
          # Homepage: approved subtle hero-text refinement only.
          # ------------------------------------------------------------
          index = Path('index.html')
          home = index.read_text(encoding='utf-8')
          old = ".hero h1{font-size:clamp(2.7rem,5.8vw,5rem);line-height:.98}"
          new = ".hero h1{font-size:clamp(2.7rem,5.8vw,5rem);line-height:.98;color:rgba(255,255,255,.99);letter-spacing:.015em;text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased;text-shadow:0 2px 10px rgba(0,0,0,.28),0 0 2px rgba(0,0,0,.10)}"
          if old in home:
              home = home.replace(old, new, 1)
          old = ".hero h1 em{display:block;font:500 italic .55em var(--sub);color:rgba(255,255,255,.58);margin-top:.6rem}"
          new = ".hero h1 em{display:block;font:500 italic .55em var(--sub);color:rgba(255,255,255,.72);margin-top:.6rem;text-shadow:0 1px 8px rgba(0,0,0,.22)}"
          if old in home:
              home = home.replace(old, new, 1)
          old = ".hero-copy{max-width:700px;color:rgba(255,255,255,.82);font-size:clamp(.93rem,1.2vw,1.03rem)}"
          new = ".hero-copy{max-width:700px;color:rgba(255,255,255,.93);font-size:clamp(.93rem,1.2vw,1.03rem);text-shadow:0 1px 8px rgba(0,0,0,.22);text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased}"
          if old in home:
              home = home.replace(old, new, 1)
          index.write_text(home, encoding='utf-8')

          # ------------------------------------------------------------
          # Analyze Fit: retain intelligence engine, replace renderer.
          # ------------------------------------------------------------
          report = Path('analyze-fit.html')
          text = report.read_text(encoding='utf-8')

          css_marker = '/* APROPOS EXECUTIVE OPPORTUNITY ASSESSMENT V1 */'
          if css_marker not in text:
              css = r'''

/* APROPOS EXECUTIVE OPPORTUNITY ASSESSMENT V1 */
:root{
  --ag-navy:#0D274D;--ag-navy2:#173B67;--ag-charcoal:#2F3947;
  --ag-light:#F4F6F8;--ag-border:#D9E0E8;--ag-green:#1B8A3A;
  --ag-amber:#D9A300;--ag-red:#B72C2C;--ag-blue:#2B6CB0;
}
.page{max-width:1040px;padding:28px 20px 90px}
.executive-report{display:grid;gap:24px}
.report-page{position:relative;background:#fff;color:var(--ag-charcoal);border:1px solid var(--ag-border);border-radius:18px;padding:46px 52px 58px;box-shadow:0 20px 55px rgba(0,0,0,.22);min-height:820px;overflow:hidden}
.report-header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--ag-navy);padding-bottom:14px;margin-bottom:28px}
.report-brand{font-size:1rem;font-weight:800;letter-spacing:.08em;color:var(--ag-navy)}
.report-brand-sub{font-size:.68rem;text-transform:uppercase;letter-spacing:.16em;color:#617083;margin-top:3px}
.report-id{text-align:right;font-size:.66rem;line-height:1.55;color:#64748b}
.report-footer{position:absolute;left:52px;right:52px;bottom:22px;border-top:1px solid var(--ag-border);padding-top:9px;display:flex;justify-content:space-between;font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:#64748b}
.cover-page{display:flex;flex-direction:column;justify-content:center;text-align:center;background:linear-gradient(145deg,#fff 0%,#f7f9fb 100%)}
.cover-logo{font-size:1.45rem;font-weight:900;letter-spacing:.13em;color:var(--ag-navy)}
.cover-intel{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ag-blue);margin-top:7px}
.cover-rule{width:96px;height:3px;background:var(--ag-blue);margin:34px auto}
.cover-kicker{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:#64748b}
.cover-title{font-size:clamp(2.4rem,5vw,3.8rem);line-height:1.05;color:var(--ag-navy);font-weight:700;margin:12px auto 30px;max-width:760px}
.cover-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px 28px;text-align:left;max-width:700px;margin:0 auto 34px;padding:22px 28px;background:#fff;border:1px solid var(--ag-border);border-radius:14px}
.cover-meta dt{font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;color:#728096}
.cover-meta dd{font-size:.86rem;font-weight:700;color:var(--ag-charcoal)}
.cover-score{width:150px;height:150px;border-radius:50%;margin:0 auto 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:8px solid var(--ag-blue);background:#fff}
.cover-score strong{font-size:4.2rem;line-height:.9;color:var(--ag-navy)}
.cover-score span{font-size:.62rem;text-transform:uppercase;letter-spacing:.13em;color:#64748b;margin-top:8px}
.cover-rec{display:inline-block;margin:0 auto;padding:11px 24px;border-radius:8px;font-size:1.35rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
.cover-confidential{margin-top:28px;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:#64748b}
.page-title{font-size:2.15rem;line-height:1.08;color:var(--ag-navy);font-weight:750;margin-bottom:8px}
.page-deck{font-size:.86rem;color:#64748b;margin-bottom:26px}
.rec-banner{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:22px 26px;border-radius:13px;margin-bottom:24px;border-left:8px solid var(--ag-blue);background:var(--ag-light)}
.rec-banner-label{font-size:.64rem;text-transform:uppercase;letter-spacing:.13em;color:#64748b}
.rec-banner-value{font-size:1.55rem;font-weight:900;color:var(--ag-navy);text-transform:uppercase}
.rec-pursue{border-left-color:var(--ag-green)}.rec-conditional{border-left-color:var(--ag-amber)}.rec-nobid{border-left-color:var(--ag-red)}
.executive-copy{display:grid;gap:12px;font-size:.92rem;line-height:1.62;margin-bottom:24px}
.report-table{width:100%;border-collapse:collapse;font-size:.78rem;margin:12px 0 24px}
.report-table th{background:var(--ag-navy);color:#fff;text-align:left;padding:10px 12px;font-size:.66rem;text-transform:uppercase;letter-spacing:.08em}
.report-table td{padding:10px 12px;border-bottom:1px solid var(--ag-border);vertical-align:top}
.report-table tr:nth-child(even) td{background:#f8fafc}
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0 8px}
.metric-card{border:1px solid var(--ag-border);border-radius:12px;padding:15px;background:#fff;min-height:92px}
.metric-label{font-size:.59rem;letter-spacing:.1em;text-transform:uppercase;color:#64748b;margin-bottom:7px}
.metric-value{font-size:1rem;font-weight:850;color:var(--ag-navy)}
.section-block{border:1px solid var(--ag-border);border-radius:13px;padding:18px 20px;margin-bottom:14px;background:#fff}
.section-block h3{font-family:'Jost',sans-serif;font-size:1rem;color:var(--ag-navy);font-weight:800;margin-bottom:7px;display:flex;gap:9px;align-items:center}
.status-dot{width:11px;height:11px;border-radius:50%;display:inline-block;background:var(--ag-blue)}
.status-good{background:var(--ag-green)}.status-warn{background:var(--ag-amber)}.status-risk{background:var(--ag-red)}
.section-summary{font-weight:700;color:#354255;margin-bottom:6px}
.section-detail{font-size:.82rem;line-height:1.55;color:#566476}
.risk-low{color:var(--ag-green);font-weight:800}.risk-medium{color:#9a7300;font-weight:800}.risk-high{color:var(--ag-red);font-weight:800}.risk-info{color:var(--ag-blue);font-weight:800}
.plan-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:22px}
.plan-card{background:var(--ag-light);border:1px solid var(--ag-border);border-radius:11px;padding:15px}
.plan-card h3{font-size:.78rem;color:var(--ag-navy);font-weight:800;margin-bottom:5px}
.plan-card p{font-size:.76rem;color:#5c6879;line-height:1.45}
.check-cell{font-size:1.05rem;color:var(--ag-blue)}
.action-columns{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:22px 0}
.action-column{border-top:4px solid var(--ag-blue);background:var(--ag-light);padding:16px;border-radius:7px}
.action-column h3{font-size:.82rem;color:var(--ag-navy);font-weight:850;margin-bottom:8px}
.action-column ul{padding-left:17px;font-size:.76rem;line-height:1.55;color:#526173}
.co-questions{counter-reset:q;display:grid;gap:9px}
.co-question{counter-increment:q;display:flex;gap:10px;padding:11px 13px;background:#f8fafc;border:1px solid var(--ag-border);border-radius:9px;font-size:.78rem}
.co-question:before{content:counter(q);width:22px;height:22px;border-radius:50%;display:grid;place-items:center;background:var(--ag-navy);color:#fff;font-size:.65rem;font-weight:800;flex:0 0 auto}
.confidence-chip{display:inline-flex;padding:5px 10px;border-radius:999px;background:#eaf1f8;color:var(--ag-navy);font-size:.68rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
.action-bar{justify-content:center}.trust-line{color:rgba(255,255,255,.5)}
@media(max-width:760px){.report-page{padding:30px 24px 54px;min-height:auto}.report-footer{left:24px;right:24px}.cover-meta,.metric-grid,.plan-grid,.action-columns{grid-template-columns:1fr}.report-header{gap:12px}.report-id{font-size:.58rem}.cover-title{font-size:2.35rem}.cover-score{width:125px;height:125px}.cover-score strong{font-size:3.4rem}}
@page{size:letter portrait;margin:.45in}
@media print{
  html,body{background:#fff!important;color:var(--ag-charcoal)!important;font-size:10.5pt!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  #progress-bar,.top-banner,header,.action-bar,.trust-line,.loading-state,.stage2-loading{display:none!important}
  .page{max-width:none!important;margin:0!important;padding:0!important}
  .executive-report{display:block!important}
  .report-page{width:100%!important;min-height:9.7in!important;border:0!important;border-radius:0!important;box-shadow:none!important;padding:.35in .42in .48in!important;margin:0!important;page-break-after:always!important;break-after:page!important;overflow:visible!important}
  .report-page:last-child{page-break-after:auto!important;break-after:auto!important}
  .report-header,.report-footer{left:.42in!important;right:.42in!important}
  .section-block,.metric-card,.plan-card,.rec-banner,.report-table tr,.action-column,.co-question{break-inside:avoid!important;page-break-inside:avoid!important}
  a,a:visited{color:inherit!important;text-decoration:none!important}
}
'''
              text = text.replace('</style>\n</head>', css + '\n</style>\n</head>', 1)

          new_renderer = r'''function renderReport(row) {
  const s1 = row.stage1 || {};
  const s2 = row.stage2 || {};
  const m = s1.match || {};
  const rec = row.recommendation || 'PENDING';
  const src = oppMeta || opp || {};
  const title = src.title || s1._title || noticeId || 'Government Contract Opportunity';
  const agency = src.agency || s1._agency || 'Not specified';
  const naics = src.naics || s1._naics || 'Not specified';
  const setAside = src.set_aside || s1._set_aside || 'Unrestricted';
  const deadline = src.response_deadline || src.deadline || s1._deadline || null;
  const solicitation = src.solicitation_number || src.solicitationNumber || noticeId || 'Not specified';
  const client = (sessionData && (sessionData.business_name || sessionData.company_name)) || localStorage.getItem('ngcc_business_name') || 'Client Organization';
  const score = Number(row.fit_score || 0);
  const assessmentId = 'AGA-' + new Date().getFullYear() + '-' + String(row.id || noticeId || Date.now()).replace(/[^a-zA-Z0-9]/g,'').slice(-8).toUpperCase();
  const prepared = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  const recLabelText = recLabel(rec);
  const recClassName = rec === 'BID' ? 'rec-pursue' : rec === 'CONDITIONAL' ? 'rec-conditional' : 'rec-nobid';
  const confidence = s2 && Object.keys(s2).length >= 4 ? 'High' : s1 && Object.keys(s1).length >= 3 ? 'Moderate' : 'Preliminary';
  const opportunityFit = score >= 80 ? 'Strong' : score >= 60 ? 'Moderate' : 'Limited';
  const eligibility = m.set_aside_eligible === false ? 'Not Confirmed' : 'Aligned';
  const competition = setAside && !/none|unrestricted/i.test(setAside) ? 'Restricted Field' : 'Open Competition';
  const pastPerformance = m.capability_alignment === 'HIGH' ? 'Strong' : m.capability_alignment === 'MEDIUM' ? 'Moderate' : 'Needs Support';
  const riskLevel = rec === 'NO_BID' ? 'High' : rec === 'CONDITIONAL' ? 'Medium' : 'Low–Medium';
  const complexity = (s2.documents_needed || []).length > 6 ? 'High' : (s2.documents_needed || []).length > 3 ? 'Moderate' : 'Standard';
  const probability = score >= 85 ? 'Favorable' : score >= 65 ? 'Competitive' : 'Challenging';
  const dl = deadlineDays(deadline);
  const contractLength = src.contract_length || src.period_of_performance || 'Verify in solicitation';
  const estimatedValue = src.estimated_value || src.award_amount || 'Not publicly stated';
  const location = src.place_of_performance || src.location || 'See official notice';
  const source = src.ui_link || src.link || 'SAM.gov / official procurement source';
  const contractType = src.contract_type || src.type || 'Verify in solicitation';

  document.getElementById('bannerTitle').textContent = title.slice(0,70);

  const arr = v => Array.isArray(v) ? v : [];
  const short = (v, fallback='Not enough information was available to complete this section.') => esc(v || fallback);
  const first = (a, fallback) => a && a.length ? esc(String(a[0].item || a[0])) : fallback;
  const listHtml = (a, fallback) => arr(a).length ? '<ul>' + arr(a).slice(0,6).map(x=>'<li>'+esc(String(x.item || x))+'</li>').join('') + '</ul>' : '<p>'+esc(fallback)+'</p>';
  const header = page => `<div class="report-header"><div><div class="report-brand">APROPOS GROUP LLC</div><div class="report-brand-sub">Government Opportunity Intelligence</div></div><div class="report-id">Assessment ID: ${esc(assessmentId)}<br>Prepared: ${esc(prepared)}<br>Page ${page} of 6</div></div>`;
  const footer = () => `<div class="report-footer"><span>CONFIDENTIAL</span><span>Prepared by APROPOS GROUP LLC</span></div>`;
  const metric = (label,value) => `<div class="metric-card"><div class="metric-label">${esc(label)}</div><div class="metric-value">${esc(value)}</div></div>`;
  const fitSection = (titleText,status,summary,detail,cls='') => `<div class="section-block"><h3><span class="status-dot ${cls}"></span>${esc(titleText)}</h3><div class="section-summary">${esc(status)}</div><div class="section-detail">${short(summary || detail)}</div></div>`;

  const execSummary = s1.opportunity_summary || 'This assessment evaluates the opportunity against the contractor’s registered capability profile, eligibility indicators, delivery readiness, and available solicitation information.';
  const rationale = s1.rationale || 'The recommendation reflects the combined strength of capability alignment, eligibility, timing, compliance burden, and execution risk.';
  const required = arr(s2.required_work);
  const staffing = arr(s2.staffing_delivery);
  const docs = arr(s2.documents_needed);
  const pricing = arr(s2.pricing_considerations);
  const checklist = arr(s2.proposal_checklist);
  const questions = arr(s2.questions_for_co);

  let html = `<div class="executive-report">`;

  html += `<section class="report-page cover-page">
    <div class="cover-logo">APROPOS GROUP LLC</div><div class="cover-intel">Government Opportunity Intelligence</div>
    <div class="cover-rule"></div><div class="cover-kicker">Executive Opportunity Assessment</div>
    <div class="cover-title">Opportunity Fit Assessment</div>
    <dl class="cover-meta"><div><dt>Prepared For</dt><dd>${esc(client)}</dd></div><div><dt>Prepared Date</dt><dd>${esc(prepared)}</dd></div><div><dt>Opportunity</dt><dd>${esc(title)}</dd></div><div><dt>Agency</dt><dd>${esc(agency)}</dd></div><div><dt>Solicitation</dt><dd>${esc(solicitation)}</dd></div><div><dt>Assessment ID</dt><dd>${esc(assessmentId)}</dd></div></dl>
    <div class="cover-score"><strong>${esc(score || '—')}</strong><span>Fit Score</span></div>
    <div class="cover-rec ${recClassName}">${esc(recLabelText)}</div>
    <div style="margin-top:12px"><span class="confidence-chip">Executive Confidence: ${esc(confidence)}</span></div>
    <div class="cover-confidential">Confidential · Prepared by APROPOS GROUP LLC</div>${footer()}</section>`;

  html += `<section class="report-page">${header(2)}<h1 class="page-title">Executive Decision Summary</h1><div class="page-deck">A concise decision view for executives, capture leaders, and proposal managers.</div>
    <div class="rec-banner ${recClassName}"><div><div class="rec-banner-label">Executive Recommendation</div><div class="rec-banner-value">${esc(recLabelText)}</div></div><span class="confidence-chip">Confidence: ${esc(confidence)}</span></div>
    <div class="executive-copy"><p>${short(execSummary)}</p><p>${short(rationale)}</p></div>
    <table class="report-table"><thead><tr><th colspan="2">Opportunity Overview</th></tr></thead><tbody>
    <tr><td>Agency</td><td>${esc(agency)}</td></tr><tr><td>Contract Type</td><td>${esc(contractType)}</td></tr><tr><td>NAICS</td><td>${esc(naics)}</td></tr><tr><td>Set Aside</td><td>${esc(setAside)}</td></tr><tr><td>Response Due</td><td>${esc(fmtDate(deadline))}${dl!==null?' · '+esc(String(dl))+' days remaining':''}</td></tr><tr><td>Estimated Value</td><td>${esc(estimatedValue)}</td></tr><tr><td>Contract Length</td><td>${esc(contractLength)}</td></tr><tr><td>Location</td><td>${esc(location)}</td></tr><tr><td>Source</td><td>${esc(source)}</td></tr></tbody></table>
    <div class="metric-grid">${metric('Opportunity Fit',opportunityFit)}${metric('Eligibility',eligibility)}${metric('Competition',competition)}${metric('Past Performance',pastPerformance)}${metric('Risk',riskLevel)}${metric('Proposal Complexity',complexity)}${metric('Probability',probability)}${metric('Confidence',confidence)}</div>${footer()}</section>`;

  html += `<section class="report-page">${header(3)}<h1 class="page-title">Fit Analysis</h1><div class="page-deck">The contractor-specific factors driving the opportunity recommendation.</div>
    ${fitSection('Why This Opportunity Fits',opportunityFit,m.naics_detail || execSummary,'',score>=70?'status-good':'status-warn')}
    ${fitSection('Business Strengths',m.capability_alignment || 'Assessment Required',m.capability_detail || rationale,'',m.capability_alignment==='HIGH'?'status-good':'status-warn')}
    ${fitSection('Capability Alignment',m.capability_alignment || opportunityFit,m.capability_detail || m.naics_detail,'',score>=70?'status-good':'status-warn')}
    ${fitSection('Relevant Experience',pastPerformance,first(required,'Review the solicitation’s experience requirements against documented projects and references.'),'',pastPerformance==='Strong'?'status-good':'status-warn')}
    ${fitSection('Staffing Readiness',staffing.length?'Requirements Identified':'Further Validation Required',first(staffing,'Confirm management, technical staffing, surge capacity, and key-person availability.'),'',staffing.length?'status-good':'status-warn')}
    ${fitSection('Past Performance',pastPerformance,m.capability_detail || 'Select references that demonstrate similar scope, agency environment, complexity, and delivery outcomes.','',pastPerformance==='Strong'?'status-good':'status-warn')}
    ${footer()}</section>`;

  const complianceRating = docs.length>6?'High':docs.length>3?'Medium':'Low';
  const scheduleRating = dl!==null && dl<=7?'High':dl!==null && dl<=21?'Medium':'Low';
  const pricingRating = pricing.length>3?'Medium':'Low';
  const teamingRating = m.capability_alignment==='LOW'?'High':m.capability_alignment==='MEDIUM'?'Medium':'Low';
  html += `<section class="report-page">${header(4)}<h1 class="page-title">Risk Assessment</h1><div class="page-deck">Priority risks requiring executive attention before proposal resources are committed.</div>
    <table class="report-table"><thead><tr><th>Category</th><th>Rating</th><th>Executive Recommendation</th></tr></thead><tbody>
    <tr><td>Compliance</td><td class="risk-${complianceRating.toLowerCase()}">${complianceRating}</td><td>${esc(first(docs,'Build a solicitation compliance matrix before drafting begins.'))}</td></tr>
    <tr><td>Past Performance</td><td class="risk-${pastPerformance==='Strong'?'low':'medium'}">${pastPerformance==='Strong'?'Low':'Medium'}</td><td>Confirm references demonstrate comparable scope, value, complexity, and outcomes.</td></tr>
    <tr><td>Schedule</td><td class="risk-${scheduleRating.toLowerCase()}">${scheduleRating}</td><td>${dl!==null?esc(String(dl))+' days remain. Establish a controlled proposal calendar immediately.':'Verify the official response deadline and amendment schedule.'}</td></tr>
    <tr><td>Pricing</td><td class="risk-${pricingRating.toLowerCase()}">${pricingRating}</td><td>${esc(first(pricing,'Validate labor, materials, indirect rates, escalation, and price-to-win assumptions.'))}</td></tr>
    <tr><td>Teaming</td><td class="risk-${teamingRating.toLowerCase()}">${teamingRating}</td><td>${teamingRating==='High'?'Identify a qualified teaming partner before committing to pursue.':'Confirm whether subcontractors strengthen technical depth or past performance.'}</td></tr>
    <tr><td>Information Quality</td><td class="risk-info">${esc(confidence)}</td><td>Resolve unanswered questions and review all amendments before final bid/no-bid approval.</td></tr></tbody></table>
    <div class="section-block"><h3><span class="status-dot status-warn"></span>Risk-Control Priority</h3><div class="section-detail">The pursuit team should validate eligibility, scope assumptions, mandatory documentation, price structure, and delivery capacity before authorizing full proposal production.</div></div>${footer()}</section>`;

  const planText = (a,fallback) => first(a,fallback);
  html += `<section class="report-page">${header(5)}<h1 class="page-title">Proposal Development Plan</h1><div class="page-deck">A practical production framework for converting the pursuit decision into a compliant response.</div>
    <div class="plan-grid"><div class="plan-card"><h3>Proposal Strategy</h3><p>${short(s2.draft_technical_approach,'Lead with the strongest differentiators, low-risk delivery approach, and direct alignment to evaluation factors.')}</p></div><div class="plan-card"><h3>Technical Volume</h3><p>${esc(planText(required,'Map every technical requirement to a specific method, deliverable, metric, and proof point.'))}</p></div><div class="plan-card"><h3>Management Volume</h3><p>${esc(planText(staffing,'Define governance, staffing, quality control, communications, and transition responsibilities.'))}</p></div><div class="plan-card"><h3>Pricing Volume</h3><p>${esc(planText(pricing,'Create a fully traceable pricing model aligned with the solicitation structure and assumptions.'))}</p></div><div class="plan-card"><h3>Compliance Documents</h3><p>${esc(planText(docs,'Build a compliance matrix covering every instruction, representation, certification, and attachment.'))}</p></div><div class="plan-card"><h3>Required Attachments</h3><p>Confirm forms, resumes, references, licenses, certifications, representations, and subcontracting documentation.</p></div></div>
    <table class="report-table"><thead><tr><th>✓</th><th>Task</th><th>Responsible Party</th><th>Status</th><th>Target Date</th></tr></thead><tbody>

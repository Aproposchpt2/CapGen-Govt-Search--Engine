<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Redeem Your CapGen Code</title>
<meta name="robots" content="noindex"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root{--ink:#0A1A3A;--surface:#0f2244;--line:rgba(91,175,255,.16);--line2:rgba(91,175,255,.34);--white:#F5F8FF;--muted:#8facd0;--cyan:#5BD3FF;--green:#54E6A8;--red:#ff7380;--disp:'Bodoni Moda',Georgia,serif;--body:'Jost',sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);background:radial-gradient(circle at 15% 0%,rgba(74,127,255,.18),transparent 30rem),var(--ink);color:var(--muted);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;line-height:1.6}
  .card{width:min(560px,100%);background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:clamp(26px,5vw,42px);box-shadow:0 30px 90px rgba(0,0,0,.4)}
  .eyebrow{font-size:.66rem;text-transform:uppercase;letter-spacing:.16em;color:var(--cyan);font-weight:600;margin-bottom:10px}
  h1{font-family:var(--disp);font-weight:400;color:var(--white);font-size:clamp(1.7rem,4vw,2.4rem);line-height:1.1;margin-bottom:8px}
  .sub{font-size:.92rem;margin-bottom:26px}
  label{display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;font-weight:600;color:var(--white);margin-bottom:6px}
  .req{color:var(--cyan)} .opt{color:var(--muted);text-transform:none;letter-spacing:0;font-weight:400}
  .field{margin-bottom:16px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  input{width:100%;background:rgba(2,6,14,.55);border:1px solid var(--line2);border-radius:11px;color:var(--white);font-family:inherit;font-size:.95rem;padding:12px 14px}
  input:focus{outline:none;border-color:var(--cyan)}
  #code{font-family:monospace;letter-spacing:2px;text-transform:uppercase;font-size:1.05rem;text-align:center}
  .btn{width:100%;margin-top:8px;min-height:52px;border:none;border-radius:11px;cursor:pointer;font-family:var(--body);font-weight:600;font-size:.82rem;letter-spacing:.14em;text-transform:uppercase;background:var(--cyan);color:#06210f;transition:transform .18s,opacity .18s}
  .btn:hover{transform:translateY(-2px)} .btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
  .msg{margin-top:14px;text-align:center;font-size:.9rem;min-height:20px}
  .msg.err{color:var(--red)}
  .done{display:none;text-align:center}
  .done .ico{font-size:2.4rem;margin-bottom:12px}
  .done h2{font-family:var(--disp);font-weight:400;color:var(--white);font-size:1.9rem;margin-bottom:10px}
  .done p{margin-bottom:22px}
  .done a{display:inline-block;background:var(--cyan);color:#06210f;font-weight:600;text-decoration:none;padding:13px 28px;border-radius:11px;letter-spacing:.1em;text-transform:uppercase;font-size:.8rem}
  @media(max-width:520px){.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="card">
  <div id="form-wrap">
    <div class="eyebrow">CapGen · Redeem</div>
    <h1>Activate your subscription</h1>
    <p class="sub">Enter your CapGen access code and your business details. Use the email you want to log in with — that's how you'll reach your dashboard.</p>
    <form id="redeem-form" novalidate>
      <div class="field"><label for="code">Access code <span class="req">*</span></label><input id="code" name="code" type="text" placeholder="CG-XXXX-XXXX-XXXX" autocomplete="off" required></div>
      <div class="row">
        <div class="field"><label for="first_name">First name <span class="req">*</span></label><input id="first_name" name="first_name" type="text" autocomplete="given-name" required></div>
        <div class="field"><label for="last_name">Last name</label><input id="last_name" name="last_name" type="text" autocomplete="family-name"></div>
      </div>
      <div class="field"><label for="email">Email <span class="req">*</span></label><input id="email" name="email" type="email" autocomplete="email" required></div>
      <div class="field"><label for="business_name">Business name <span class="req">*</span></label><input id="business_name" name="business_name" type="text" autocomplete="organization" required></div>
      <div class="row">
        <div class="field"><label for="phone">Phone</label><input id="phone" name="phone" type="tel" autocomplete="tel"></div>
        <div class="field"><label for="uei">SAM.gov UEI <span class="opt">(optional)</span></label><input id="uei" name="uei" type="text" placeholder="12-character UEI"></div>
      </div>
      <button class="btn" type="submit" id="btn">Redeem &amp; Activate</button>
      <div class="msg" id="msg"></div>
    </form>
  </div>
  <div class="done" id="done">
    <div class="ico">✅</div>
    <h2>You're activated.</h2>
    <p>Your CapGen subscription is live. Sign in with your email to set up your dashboard.</p>
    <a href="/onboarding.html" id="signin">Sign in →</a>
  </div>
</div>
<script>
(function(){
  var form=document.getElementById('redeem-form'),msg=document.getElementById('msg'),
      btn=document.getElementById('btn'),wrap=document.getElementById('form-wrap'),done=document.getElementById('done');
  function emailOk(v){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test((v||'').toLowerCase());}
  // Allow ?code= prefill from the voucher email link
  var pc=new URLSearchParams(location.search).get('code'); if(pc) form.code.value=pc;

  form.addEventListener('submit',function(e){
    e.preventDefault();
    msg.className='msg';msg.textContent='';
    var data={code:form.code.value.trim(),first_name:form.first_name.value.trim(),last_name:form.last_name.value.trim(),
      email:form.email.value.trim().toLowerCase(),business_name:form.business_name.value.trim(),phone:form.phone.value.trim(),uei:form.uei.value.trim()};
    if(!data.code||!data.first_name||!data.email||!data.business_name){msg.className='msg err';msg.textContent='Please fill in the code, your name, email, and business name.';return;}
    if(!emailOk(data.email)){msg.className='msg err';msg.textContent='Please enter a valid email address.';return;}
    btn.disabled=true;btn.textContent='Activating…';
    fetch('/.netlify/functions/redeem-voucher',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
      .then(function(r){return r.json().then(function(j){return {ok:r.ok,j:j};});})
      .then(function(res){
        if(res.ok){document.getElementById('signin').href='/onboarding.html';wrap.style.display='none';done.style.display='block';}
        else{msg.className='msg err';msg.textContent=(res.j&&res.j.message)||(res.j&&res.j.error)||'Could not redeem that code.';btn.disabled=false;btn.textContent='Redeem & Activate';}
      })
      .catch(function(){msg.className='msg err';msg.textContent='Network error. Please try again.';btn.disabled=false;btn.textContent='Redeem & Activate';});
  });
})();
</script>
</body>
</html>

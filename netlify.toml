[build]
  publish = "."
  functions = "netlify/functions"

  [build.environment]
    NODE_VERSION = "18"
    PDF_RENDERER = "adobe"
    SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL"

[functions]
  node_bundler = "esbuild"

[functions."generate-capability-background"]
  external_node_modules = ["adm-zip"]

[[edge_functions]]
  path = "/"
  function = "capgen-hero-rewrite"

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/sms-consent"
  to = "/sms-consent.html"
  status = 200

[[redirects]]
  from = "/pipeline"
  to = "/pipeline-dashboard.html"
  status = 200

[[redirects]]
  from = "/capgen"
  to = "/capability-generator.html"
  status = 200

[[redirects]]
  from = "/apropos"
  to = "/ag-dashboard.html"
  status = 200

[[redirects]]
  from = "/pro"
  to = "/capgen-pro.html"
  status = 200

[[redirects]]
  from = "/pro/thankyou"
  to = "/capgen-pro-thankyou.html"
  status = 200

[[redirects]]
  from = "/offer"
  to = "https://ai4-product-purchasing.ai4businesses.org/capgen-offer.html"
  status = 301
  force = true

[[redirects]]
  from = "/welcome"
  to = "/welcome.html"
  status = 200

[[redirects]]
  from = "/onboarding"
  to = "https://capgen.aproposgroupllc.com/login"
  status = 301
  force = true

[[redirects]]
  from = "/redeem"
  to = "/capgen-redeem.html"
  status = 200

[[redirects]]
  from = "/signin"
  to = "https://capgen.aproposgroupllc.com/login"
  status = 301
  force = true

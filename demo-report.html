<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Capability Report — CapGen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@1&family=Jost:wght@400;600;700&display=swap" rel="stylesheet">
<script>var _cs=sessionStorage.getItem('capgen_session');var _bt=new URLSearchParams(location.search).get('t')||localStorage.getItem('demo_view_token')||'';if(_cs||(_bt&&_bt.startsWith('beta_'))){document.documentElement.style.setProperty('--sub-bar','none');}</script>
<style>
.sub-bar{display:var(--sub-bar,flex)!important}
:root{--sap:#0F2A6A;--sap2:#163472;--white:#fff;--green:#6EE7A8;--muted:rgba(255,255,255,.55);font-family:'Jost',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--sap);color:var(--white);min-height:100vh}

.top-banner{background:var(--sap2);border-bottom:1px solid rgba(255,255,255,.12);
  padding:11px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.banner-biz{font-size:.88rem;font-weight:700}
.back-btn{background:var(--white);color:var(--sap);font-family:'Jost',sans-serif;font-weight:700;
  font-size:.78rem;padding:7px 16px;border-radius:8px;text-decoration:none;white-space:nowrap;transition:.15s}
.back-btn:hover{opacity:.88}

header{background:var(--sap2);border-bottom:1px solid rgba(255,255,255,.1);padding:14px 28px;
  display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:12px}
.brand-mark{width:40px;height:40px;border-radius:10px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:var(--green)}
.brand-name{font-size:1rem;font-weight:700}
.brand-sub{font-size:.72rem;color:var(--muted)}
.action-bar{display:flex;gap:10px}
.btn-email{background:rgba(110,231,168,.15);border:1px solid rgba(110,231,168,.3);color:var(--green);
  font-family:'Jost',sans-serif;font-weight:700;font-size:.8rem;padding:8px 18px;border-radius:8px;
  cursor:pointer;transition:.18s;border-radius:8px}
.btn-email:hover{background:rgba(110,231,168,.25)}
.btn-print{background:var(--white);color:var(--sap);font-family:'Jost',sans-serif;font-weight:700;
  font-size:.8rem;padding:8px 18px;border-radius:8px;cursor:pointer;border:none;transition:.15s}
.btn-print:hover{opacity:.88}

.page{max-width:900px;margin:0 auto;padding:28px 20px 60px}

/* Report preview */
.report-frame{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.4);
  margin-bottom:24px}
.report-frame iframe{width:100%;height:960px;border:none;display:block}

.loading-state{text-align:center;padding:80px 20px;color:var(--muted);font-size:.9rem}
.spinner{width:44px;height:44px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--green);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-state{text-align:center;padding:60px;color:#F87171}

.trust-line{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.82rem;
  color:rgba(255,255,255,.35);text-align:center;margin-top:12px}

/* Subscribe bar */
.sub-bar{position:fixed;bottom:0;left:0;right:0;background:var(--sap2);border-top:1px solid rgba(255,255,255,.1);
  padding:12px 28px;display:flex;align-items:center;justify-content:space-between;gap:14px;
  z-index:100;flex-wrap:wrap}
.sub-bar-text{font-size:.84rem;color:var(--muted)}
.sub-bar-text strong{color:var(--white)}
.sub-cta{background:var(--white);color:var(--sap);font-family:'Jost',sans-serif;font-weight:700;
  font-size:.88rem;padding:10px 22px;border-radius:8px;text-decoration:none;white-space:nowrap}

@media(max-width:600px){
  .top-banner{padding:10px 14px}.page{padding:14px 12px 80px}
  .action-bar{flex-wrap:wrap}.report-frame iframe{height:600px}
  .sub-bar{flex-direction:column;align-items:stretch;text-align:center}
}
</style>
</head>
<body>

<div class="top-banner">
  <span class="banner-biz" id="bannerBiz">Capability Report</span>
  <div style="display:flex;align-items:center;gap:10px">
    <a href="#" class="back-btn" id="backBtn">← Return to All Contracts</a>
    <button id="signOutBtn" onclick="signOut()" style="display:none;background:#fff;color:#0F2A6A;font-family:'Jost',sans-serif;font-weight:700;font-size:.76rem;padding:7px 16px;border-radius:8px;border:none;cursor:pointer;white-space:nowrap">Sign Out</button>
  </div>
</div>

<header>
  <div class="brand">
    <div class="brand-mark">CG</div>
    <div>
      <div class="brand-name">CapGen</div>
      <div class="brand-sub">Capability Report</div>
    </div>
  </div>
  <div class="action-bar">
    <button class="btn-email" id="emailBtn" onclick="emailReport()" style="display:none">Email My Report →</button>
    <button class="btn-print" id="printBtn" onclick="printReport()" style="display:none">Save as PDF ↓</button>
  </div>
</header>

<div class="page">
  <div id="loadingEl" class="loading-state">
    <div class="spinner"></div>
    <p>Generating your capability report from official public records…</p>
  </div>
  <div class="report-frame" id="reportFrame" style="display:none">
    <iframe id="reportIframe" title="Capability Report"></iframe>
  </div>
  <p class="trust-line" id="trustLine" style="display:none">Sourced from official public records.</p>
</div>

<div class="sub-bar">
  <div class="sub-bar-text"><strong>Subscribe</strong> to keep your report updated daily and unlock all features.</div>
  <a href="https://ai4-product-purchasing.ai4businesses.org/capgen-offer.html" id="subCta" class="sub-cta">Subscribe Now →</a>
</div>

<script>
'use strict';
const STRIPE_OFFER = 'https://ai4-product-purchasing.ai4businesses.org/capgen-offer.html';
const q = new URLSearchParams(location.search);
const token = q.get('t') || localStorage.getItem('demo_view_token') || '';

// Ordered page state: subscriber → beta → demo
function getPageState() {
  if (sessionStorage.getItem('capgen_session')) return 'subscriber';
  if (token && token.startsWith('beta_'))        return 'beta';
  return 'demo';
}
const pageState = getPageState();

document.getElementById('backBtn').href = token ? '/demo/snapshot?t=' + encodeURIComponent(token) : '/demo';
document.getElementById('subCta').href  = STRIPE_OFFER;
if (token && !token.startsWith('beta_')) localStorage.setItem('demo_view_token', token);

if (pageState === 'subscriber') {
  const bar = document.querySelector('.sub-bar');
  if (bar) bar.style.display = 'none';
  const so = document.getElementById('signOutBtn');
  if (so) so.style.display = 'inline-block';
} else if (pageState === 'beta') {
  const bar = document.querySelector('.sub-bar');
  if (bar) bar.style.display = 'none';
}

function signOut() {
  sessionStorage.clear();
  window.location.href = '/';
}

let entityData = null;

async function load() {
  if (token === 'apex-demo') { renderDemoCapability(); return; }
  if (!token) {
    document.getElementById('loadingEl').innerHTML = '<p class="error-state">No session. <a href="/demo" style="color:var(--green)">Start a new demo →</a></p>';
    return;
  }
  try {
    // Beta tokens use beta-report.js; demo/subscriber tokens use demo-report.js
    const reportFn = token.startsWith('beta_') ? 'beta-report' : 'demo-report';
    const res  = await fetch('/.netlify/functions/' + reportFn + '?t=' + encodeURIComponent(token));
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Report generation failed');

    entityData = data.entity;
    const bizName = entityData && entityData.legal_name ? entityData.legal_name : '';
    if (bizName) document.getElementById('bannerBiz').textContent = bizName + ' — Capability Report';

    // Render in iframe
    const iframe = document.getElementById('reportIframe');
    iframe.srcdoc = data.html;
    document.getElementById('loadingEl').style.display = 'none';
    document.getElementById('reportFrame').style.display = 'block';
    document.getElementById('trustLine').style.display = 'block';
    document.getElementById('emailBtn').style.display = 'inline-block';
    document.getElementById('printBtn').style.display = 'inline-block';

  } catch(e) {
    document.getElementById('loadingEl').innerHTML =
      '<p class="error-state">Could not generate report: ' + e.message + '</p>';
  }
}

// Public demo — inject a static APEX Group LLC capability profile (no backend).
function renderDemoCapability() {
  document.getElementById('bannerBiz').textContent = 'APEX Group LLC — Capability Report';
  document.getElementById('reportIframe').srcdoc = `<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;color:#1a2740;background:#fff;padding:34px;line-height:1.5;font-size:13px}
.h{border-bottom:4px solid #C8A84B;padding-bottom:14px;margin-bottom:18px}
.h h1{font-size:27px;color:#0A1A3A;letter-spacing:.5px}
.h .tag{color:#4A5A78;font-size:13px;margin-top:5px;font-style:italic}
.g{display:grid;grid-template-columns:1.6fr 1fr;gap:24px}
h2{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#C8A84B;border-bottom:1px solid #d8dee8;padding-bottom:4px;margin:16px 0 8px}
ul{list-style:none} li{padding:3px 0 3px 16px;position:relative} li:before{content:"\\25B8";color:#0A1A3A;position:absolute;left:0}
.d{display:flex;justify-content:space-between;border-bottom:1px solid #eef1f6;padding:4px 0;font-size:12px}
.d span:first-child{color:#6a7892;font-weight:700}
.naics{font-family:monospace;font-size:12px;color:#0A1A3A;line-height:1.9}
.pp{margin-bottom:9px} .pp strong{color:#0A1A3A;font-size:12px} .pp p{color:#4A5A78;font-size:11.5px}
.f{margin-top:18px;border-top:1px solid #d8dee8;padding-top:10px;color:#90a;font-size:10.5px;color:#8a96ab;font-style:italic}
</style></head><body>
<div class="h"><h1>APEX GROUP LLC</h1><div class="tag">Mission-focused IT and professional services for federal agencies.</div></div>
<div class="g">
  <div>
    <h2>Core Competencies</h2>
    <ul>
      <li>Systems integration, modernization &amp; sustainment</li>
      <li>Cybersecurity, RMF &amp; A&amp;A / FedRAMP compliance</li>
      <li>Cloud migration &amp; managed cloud services</li>
      <li>IT help desk &amp; tier 1&ndash;3 end-user support</li>
      <li>Data engineering &amp; analytics</li>
      <li>Program &amp; project management (PMP / Agile)</li>
    </ul>
    <h2>Differentiators</h2>
    <ul>
      <li>Cleared, credentialed technical workforce</li>
      <li>Low-risk, continuity-first transition methodology</li>
      <li>Process maturity aligned to CMMI &amp; ISO practices</li>
      <li>Performance measured against clear, agency-facing SLAs</li>
    </ul>
    <h2>Representative Past Performance</h2>
    <div class="pp"><strong>DoD Component &mdash; IT Sustainment &amp; Help Desk</strong><p>Multi-year operations &amp; maintenance with sustained SLA performance across distributed sites.</p></div>
    <div class="pp"><strong>Federal Civilian Agency &mdash; Cybersecurity A&amp;A</strong><p>Assessment &amp; authorization support; RMF package development and continuous monitoring.</p></div>
    <div class="pp"><strong>Federal Agency &mdash; Cloud Migration Advisory</strong><p>Phased migration of legacy workloads with zero unplanned downtime during cutover.</p></div>
  </div>
  <div>
    <h2>Company Data</h2>
    <div class="d"><span>Business Type</span><span>Small Business</span></div>
    <div class="d"><span>Primary NAICS</span><span class="naics">541511</span></div>
    <div class="d"><span>UEI</span><span>On request</span></div>
    <div class="d"><span>CAGE</span><span>On request</span></div>
    <h2>NAICS Codes</h2>
    <div class="naics">541511 &middot; 541512 &middot; 541519<br>541611 &middot; 541618 &middot; 541690<br>541330 &middot; 518210</div>
    <h2>Certifications</h2>
    <ul><li>Small Business</li><li>SAM.gov registered &amp; active</li></ul>
    <h2>Contact</h2>
    <div class="d"><span>Email</span><span>captures@apexgroup.example</span></div>
    <div class="d"><span>Web</span><span>apexgroup.example</span></div>
  </div>
</div>
<div class="f">CapGen sample capability profile &mdash; illustrative demo content, built automatically from your registered profile in the live product.</div>
</body></html>`;
  document.getElementById('loadingEl').style.display = 'none';
  document.getElementById('reportFrame').style.display = 'block';
  var tl = document.getElementById('trustLine'); if (tl) tl.style.display = 'block';
  var pb = document.getElementById('printBtn'); if (pb) pb.style.display = 'inline-block';
  var eb = document.getElementById('emailBtn'); if (eb) eb.style.display = 'none'; // no email in demo
}

function printReport() {
  const iframe = document.getElementById('reportIframe');
  iframe.contentWindow.print();
}

async function emailReport() {
  const btn = document.getElementById('emailBtn');
  btn.textContent = 'Sending…';
  btn.disabled = true;
  try {
    // Calls generate-capability-background which emails the PDF
    const res = await fetch('/.netlify/functions/generate-capability-background', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(entityData),
    });
    if (res.ok) {
      btn.textContent = 'Sent ✓';
      btn.style.background = 'rgba(110,231,168,.3)';
    } else {
      btn.textContent = 'Email My Report →';
      btn.disabled = false;
    }
  } catch(e) {
    btn.textContent = 'Email My Report →';
    btn.disabled = false;
  }
}

load();
</script>
</body>
</html>
